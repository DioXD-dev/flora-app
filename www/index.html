<script>
// ── Daftarkan Service Worker ke URL yang sama dengan ?sw=1 ───────────────
if ('serviceWorker' in navigator && location.search !== '?sw=1') {
  navigator.serviceWorker.register('?sw=1', { scope: './' })
    .then(r => console.log('[Flora] SW registered, scope:', r.scope))
    .catch(e => console.warn('[Flora] SW failed:', e.message));
}

// ── Install prompt ───────────────────────────────────────────────────────
let dpr;
const banner   = document.getElementById('pwa-banner');
const showBanner = () => { banner.style.display='flex'; requestAnimationFrame(()=>requestAnimationFrame(()=>banner.classList.add('show'))); };
const hideBanner = () => {
  banner.classList.remove('show');
  setTimeout(() => { banner.style.display='none'; }, 400);
};

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  dpr = e;
  setTimeout(showBanner, 1500);
});

document.getElementById('btn-ok').onclick = async () => {
  hideBanner();
  if (dpr) { dpr.prompt(); await dpr.userChoice; dpr = null; }
};
document.getElementById('btn-no').onclick = () => hideBanner();
window.addEventListener('appinstalled', () => hideBanner());
</script>

// Bangun daftar folder dari songs secara reaktif — count selalu akurat
const mkFolders = (songs, staticFolders) => {
  // Kumpulkan semua folder dari songs (termasuk yang baru diimpor)
  const fromSongs = [...new Set(songs.map(s => s.folder).filter(Boolean))];
  // Merge dengan FOLDERS statis (untuk path) — utamakan path dari static jika tersedia
  const pathMap = Object.fromEntries(staticFolders.map(f => [f.name, f.path]));
  return fromSongs.map(name => ({
    name,
    path: pathMap[name] || name,
    count: songs.filter(s => s.folder === name).length,
  }));
};

function getGreetingKey() {
  const hour = new Date().getHours();
  if (hour >= 5 && hour < 10) return "g_morning";
  if (hour >= 18 || hour < 5) return "g_night";
  const rand = Math.random();
  if (rand < 0.33) return "g_listen";
  if (rand < 0.66) return "g_taste";
  return "g_hi";
}

function hexToFilter(hex) {
  // Convert hex accent color to CSS hue-rotate filter approximation
  if (!hex || hex === "currentColor") return "";
  // Parse hex
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0;
  if (max !== min) {
    const d = max - min;
    if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else h = ((r - g) / d + 4) / 6;
  }
  const hDeg = Math.round(h * 360);
  // Base logo is black (#000), so we use: invert -> sepia -> hue-rotate -> saturate -> brightness
  return `invert(1) sepia(1) saturate(8) hue-rotate(${hDeg - 30}deg) brightness(0.85)`;
}
function ButterflyIcon({ size=22, col="currentColor", dynamic=false, accentColor=null }) {
  const filterStyle = dynamic && accentColor ? hexToFilter(accentColor) : "none";
  return <img src={`data:image/png;base64,${FLORA_LOGO_B64}`} style={{
    height: size,
    width: "auto",
    objectFit: "contain",
    filter: filterStyle,
    transition: "filter 0.4s ease, height 0.2s ease",
  }} />;
}

function Ic({ n, size=22, col="currentColor", outline=false }) {
  if (!PATHS[n]) return null;
  if (outline) return (
    <svg viewBox="0 0 24 24" fill="none" stroke={col} strokeWidth="2" width={size} height={size}>
      <path d={PATHS[n]}/>
    </svg>
  );
  return (
    <svg viewBox="0 0 24 24" fill={col} width={size} height={size}>
      <path d={PATHS[n]}/>
    </svg>
  );
}

/* Ambient geometric decoration — top-right of header */
function AmbientGeo({ dc, shapeIdx, dark, isPlaying, amoled, amoledShadows }) {
  if (amoled && !amoledShadows) return null;
  const shape = AMBIENT_GEO[shapeIdx % AMBIENT_GEO.length](dc);
  return (
    <svg
      style={{position:"absolute",top:0,right:-40,width:520,height:320,
        zIndex:0,pointerEvents:"none",
        opacity: dark ? 0.28 : 0.45,
        transition:"opacity 1.2s ease",
        willChange:"transform",      // compositor layer sendiri — tidak rebut thread scroll
        contain:"layout paint",      // isolasi paint agar tidak invalidasi layout induk
      }}
      viewBox="0 0 560 320">
      <defs>
        <filter id="geo-blur" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="72"/>
        </filter>
      </defs>
      <g filter="url(#geo-blur)" className={isPlaying ? "geo-pulse" : ""}>{shape}</g>
    </svg>
  );
}

/* Seekbar */
function Seekbar({ progress, duration, onSeek, dc, dd, dark, dlLum, hasCover }) {
  const hexLum = hex => {
    const h = (hex||"000000").replace("#","");
    if (h.length < 6) return 0;
    const r = parseInt(h.slice(0,2),16)/255, g = parseInt(h.slice(2,4),16)/255, b = parseInt(h.slice(4,6),16)/255;
    const toL = c => c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);
    return 0.2126*toL(r)+0.7152*toL(g)+0.0722*toL(b);
  };
  const ref  = useRef(null);
  const drag = useRef(false);
  const pct  = duration ? Math.min((progress/duration)*100,100) : 0;
  const toT  = cx => {
    const r = ref.current.getBoundingClientRect();
    return (Math.max(0, Math.min(cx-r.left, r.width)) / r.width) * duration;
  };
  return (
    <div style={{ padding:"0 22px" }}>
      {/* Track — tap/drag area */}
      <div ref={ref}
        onPointerDown={e=>{ drag.current=true; ref.current.setPointerCapture(e.pointerId); onSeek(toT(e.clientX)); }}
        onPointerMove={e=>{ if(drag.current) onSeek(toT(e.clientX)); }}
        onPointerUp={()=>{ drag.current=false; }}
        style={{ height:28, display:"flex", alignItems:"center", cursor:"pointer", userSelect:"none", touchAction:"none" }}>
        <div style={{ width:"100%", height:7, background: (hasCover || dark || dlLum <= 0.35) ? "rgba(255,255,255,0.18)" : "rgba(0,0,0,0.13)", borderRadius:99, overflow:"hidden" }}>
          <div style={{ height:"100%", borderRadius:99, width:`${pct}%`,
            background: (() => {
              const pgLum = hasCover ? 0 : (dark ? 0.02 : 1.0);
              const cLow = Math.abs(hexLum(dc) - pgLum) < 0.12;
              const fill  = cLow ? (pgLum < 0.35 ? "rgba(255,255,255,0.92)" : "#1a1a1a") : dc;
              const fillD = cLow ? (pgLum < 0.35 ? "rgba(255,255,255,0.55)" : "rgba(0,0,0,0.45)") : dd;
              return `linear-gradient(90deg,${fillD},${fill})`;
            })(),
            boxShadow:`0 0 6px 1px ${dc}88`,
            transition:"width 0.18s linear" }}/>
        </div>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", marginTop:2 }}>
        <span style={{ fontSize:11, fontWeight:700, color:"#aaa", letterSpacing:0.3 }}>{fmt(progress)}</span>
        <span style={{ fontSize:11, fontWeight:700, color:"#aaa", letterSpacing:0.3 }}>{fmt(duration||0)}</span>
      </div>
    </div>
  );
}

/* Song Row */
/* ======================================================
   SCROLL BOUNCE HOOK — DOM-direct, zero re-render
====================================================== */
/* ======================================================
   VIRTUAL LIST HOOK — hanya render baris yang terlihat
====================================================== */
/* ======================================================
   SAFE TINT — background aksen yang aman untuk dark/AMOLED
   Masalah: dl (colorLight) = pastel terang, hanya cocok di mode terang.
   di dark/AMOLED langsung menyilaukan. dd (colorDark) mendekati hitam
   jadi tak terlihat di atas background gelap.
   Solusi: gunakan dc (mid-accent) dengan opacity rendah — selalu terbaca
   di background apapun, dan tetap memancarkan warna aksen.
====================================================== */
function safeTint(dc, dark, amoled) {
  if (amoled) return dc + "18";  // sangat subtle di AMOLED hitam
  if (dark)   return dc + "22";  // subtle di dark mode
  return null; // gunakan dl (colorLight) di light mode
}
function safeHover(dc, dark, amoled) {
  if (amoled) return dc + "20";
  if (dark)   return dc + "28";
  return null; // gunakan dl di light mode
}
// Helper: pilih warna teks atas safeTint background
function safeTintText(dc, dd, dark, amoled) {
  if (dark || amoled) return dc; // warna aksen terang di atas background gelap
  return dd;
}

const ROW_H = 78; // px per SongRow (padding 10+10 + cover 52 + margin 6)
const OVERSCAN = 6; // baris buffer di atas & bawah viewport

function useVirtualList(scrollRef, totalCount) {
  const [range, setRange] = useState({ start: 0, end: Math.min(totalCount, 20) });
  const prevCount = useRef(totalCount);
  const rafId = useRef(null);

  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;

    const compute = () => {
      const scrollTop = el.scrollTop;
      const viewH     = el.clientHeight;
      const start     = Math.max(0, Math.floor(scrollTop / ROW_H) - OVERSCAN);
      const end       = Math.min(totalCount, Math.ceil((scrollTop + viewH) / ROW_H) + OVERSCAN);
      setRange(r => (r.start === start && r.end === end) ? r : { start, end });
    };

    let scrollTimer = null;
    const onScroll = () => {
      el.classList.add('is-scrolling');
      document.body.classList.add('is-scrolling');
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        el.classList.remove('is-scrolling');
        document.body.classList.remove('is-scrolling');
      }, 150);
      if (rafId.current) return;
      rafId.current = requestAnimationFrame(() => { rafId.current = null; compute(); });
    };

    compute();
    el.addEventListener('scroll', onScroll, { passive: true });
    const ro = new ResizeObserver(compute);
    ro.observe(el);
    return () => {
      el.removeEventListener('scroll', onScroll);
      ro.disconnect();
      if (rafId.current) cancelAnimationFrame(rafId.current);
      clearTimeout(scrollTimer);
      el.classList.remove('is-scrolling');
    };
  }, [scrollRef, totalCount]);

  // Reset range hanya jika jumlah lagu bertambah (impor baru), bukan saat restore scroll
  useEffect(() => {
    if (totalCount > prevCount.current) {
      setRange({ start: 0, end: Math.min(totalCount, 20) });
    }
    prevCount.current = totalCount;
  }, [totalCount]);

  const paddingTop    = range.start * ROW_H;
  const paddingBottom = Math.max(0, (totalCount - range.end) * ROW_H);

  return { ...range, paddingTop, paddingBottom };
}

// Hook: simpan & restore posisi scroll per halaman
function useScrollRestore(scrollRef, scrollKey, scrollPositions) {
  useEffect(() => {
    const el = scrollRef.current;
    if (!el || !scrollKey || !scrollPositions) return;
    el.dataset.scrollKey = scrollKey; // tandai elemen agar bisa dicari oleh goTo
    const saved = scrollPositions.current[scrollKey];
    if (saved) el.scrollTop = saved;
    const save = () => { scrollPositions.current[scrollKey] = el.scrollTop; };
    el.addEventListener('scroll', save, { passive: true });
    return () => { el.removeEventListener('scroll', save); };
  }, [scrollKey]);
}

function useScrollBounce(scrollRef) {
  useEffect(() => {
    const el = scrollRef.current;
    if (!el) return;
    let timer = null;
    const onScroll = () => {
      const atTop    = el.scrollTop <= 0;
      const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 2;
      const cls = atTop ? "scroll-bounce-down" : atBottom ? "scroll-bounce-up" : null;
      if (!cls) return;
      if (timer) clearTimeout(timer);
      el.classList.remove("scroll-bounce-down", "scroll-bounce-up");
      void el.offsetWidth;
      el.classList.add(cls);
      timer = setTimeout(() => {
        el.classList.remove("scroll-bounce-down", "scroll-bounce-up");
      }, 400);
    };
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => { el.removeEventListener('scroll', onScroll); clearTimeout(timer); };
  }, []);
}

/* ======================================================
   SCROLL-DIRECTION-AWARE ANIMATION HOOK
   Menggunakan IntersectionObserver — animasi hanya terpicu
   saat item memasuki viewport saat scroll, bukan saat mount.
====================================================== */
function useDirectionalScrollAnim(containerRef, deps) {
  const scrollDirRef = useRef(1); // 1 = down, -1 = up
  const lastY        = useRef(0);

  // Track scroll direction via listener terpisah (ref only, no re-render)
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const onScroll = () => {
      scrollDirRef.current = el.scrollTop >= lastY.current ? 1 : -1;
      lastY.current = el.scrollTop;
    };
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => el.removeEventListener('scroll', onScroll);
  }, []);

  // IntersectionObserver — re-attach saat deps berubah
  useEffect(() => {
    const container = containerRef.current;
    if (!container) return;
    const seenEls = new WeakSet();
    const obs = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) {
          // Item keluar viewport → tandai agar animasi terpicu saat masuk kembali
          seenEls.add(entry.target);
          return;
        }
        // Item baru visible pertama kali saat mount → biarkan CSS awal yang handle
        if (!seenEls.has(entry.target)) return;
        // Item masuk kembali saat scroll → terapkan animasi sesuai arah
        const el = entry.target;
        const cls = scrollDirRef.current >= 0 ? 'row-slide-up' : 'row-slide-down';
        el.classList.remove('row-slide-up', 'row-slide-down');
        void el.offsetWidth; // force reflow agar animasi restart
        el.classList.add(cls);
      });
    }, { root: container, threshold: 0.05 });
    container.querySelectorAll('[data-list-row]').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, deps ?? []);
}

/* ======================================================
   PILL SCROLLBAR HOOK — pengganti native scrollbar untuk
/* ======================================================
   PRESS ZOOM HOOK — durasi zoom mengikuti lama sentuh
====================================================== */
function usePressZoom(scale = 0.96) {
  const ref = useRef(null);
  const pressStart = useRef(null);

  const onDown = useCallback(() => {
    pressStart.current = Date.now();
    if (ref.current) {
      ref.current.style.transition = "transform 0.10s cubic-bezier(0.4,0,0.6,1), background 0.2s";
      ref.current.style.transform  = `scale(${scale})`;
    }
  }, [scale]);

  const onUp = useCallback(() => {
    if (!ref.current || pressStart.current === null) return;
    const held = Date.now() - pressStart.current;
    pressStart.current = null;
    const dur = Math.min(420, Math.max(180, held * 0.7));
    ref.current.style.transition = `transform ${dur}ms cubic-bezier(0.34,1.56,0.64,1), background 0.2s`;
    ref.current.style.transform  = "scale(1)";
  }, []);

  return { ref, onDown, onUp };
}

const SongRow = React.memo(function SongRow({ song, isCurrent, isPlaying, onPlay, onFav, dc, dd, dl, dark, delay=0,
                   selectionMode, isSelected, onLongPress, onSelect,
                   swipeLeftEnabled=false, swipeLeftAction="delete", onSwipeAction }) {
  const txt    = dark ? "#eee"    : "#1a1a1a";
  const sub    = dark ? "#888"    : "#aaa";
  const hov    = dark ? "#252525" : "#f4f1ec";
  const lpTimer = useRef(null);
  const longPressed = useRef(false);
  const { ref: zoomRef, onDown: zoomDown, onUp: zoomUp } = usePressZoom(0.96);


  const handlePointerDown = () => {
    longPressed.current = false;
    zoomDown();
    lpTimer.current = setTimeout(() => {
      longPressed.current = true;
      onLongPress(song.id);
    }, 500);
  };

  const handlePointerMove = () => {
    if (lpTimer.current) {
      clearTimeout(lpTimer.current);
      lpTimer.current = null;
    }
  };

  const handlePointerUp = () => {
    zoomUp();
    if (lpTimer.current) {
      clearTimeout(lpTimer.current);
      lpTimer.current = null;
    }
  };

  const handleClick = () => {
    if (longPressed.current) {
      longPressed.current = false;
      return;
    }
    if (selectionMode) {
      onSelect(song.id);
      return;
    }
    onPlay();
  };

  const currentBg = dark ? dc+"28" : dl;
  const titleColor = isCurrent ? (dark ? "#fff" : dd) : txt;

  // Hitung luminance dari dl (colorLight) untuk menentukan kontras teks
  const dlLum = (() => {
    if (!dl || !isCurrent || dark) return 1; // dark mode: anggap gelap
    const hex = dl.replace("#","");
    if (hex.length < 6) return 1;
    const r = parseInt(hex.slice(0,2),16)/255;
    const g = parseInt(hex.slice(2,4),16)/255;
    const b = parseInt(hex.slice(4,6),16)/255;
    const toL = c => c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);
    return 0.2126*toL(r)+0.7152*toL(g)+0.0722*toL(b);
  })();
  // Jika background terang (lum > 0.35) → teks gelap; jika gelap → putih
  const subColor = isCurrent && !dark
    ? (dlLum > 0.35 ? dd+"cc" : "rgba(255,255,255,0.85)")
    : sub;
  const titleColorDynamic = isCurrent && !dark
    ? (dlLum > 0.35 ? dd : "#fff")
    : titleColor;

  return (
    <div
      ref={zoomRef}
      className="song-row-item"
      onClick={handleClick}
      onPointerDown={handlePointerDown}
      onPointerMove={handlePointerMove}
      onPointerUp={handlePointerUp}
      onPointerLeave={handlePointerUp}
      style={{
        display:"flex", alignItems:"center", gap:14,
        padding:"10px 12px", borderRadius:18, marginBottom:6,
        background: isSelected ? dc+"28" : isCurrent ? currentBg : "transparent",
        cursor:"pointer", transition:"background 0.2s, transform 0.12s cubic-bezier(0.4,0,0.6,1)",
        animation:`slideUp 0.30s ease ${delay}ms both`,
          border: isSelected
            ? `1.5px solid ${dc}66`
            : isCurrent
              ? `1.5px solid ${dark ? dc+"88" : dc+"44"}`
              : `1px solid ${dark ? "rgba(255,255,255,0.10)" : "rgba(0,0,0,0.07)"}`,
          userSelect:"none",
          position:"relative",
        }}
>
      {/* Left accent bar for current song */}
      {isCurrent && !selectionMode && (
        <div style={{
          position:"absolute", left:0, top:8, bottom:8, width:3,
          background:`linear-gradient(180deg,${dc},${dd})`,
          borderRadius:"0 4px 4px 0",
        }}/>
      )}
      <div style={{position:"relative", flexShrink:0,
        borderRadius:"var(--cover-radius, 14px)",
        boxShadow: dark ? "0 4px 10px rgba(255,255,255,0.10)" : "0 4px 10px rgba(0,0,0,0.18)",
      }}>
        <CoverArt song={song} size={52} />
        {selectionMode && (
          <div style={{ position:"absolute", inset:0, borderRadius:13,
            background: isSelected ? dc+"cc" : "rgba(0,0,0,0.38)",
            display:"flex", alignItems:"center", justifyContent:"center",
            transition:"background 0.2s" }}>
            {isSelected
              ? <Ic n="check" size={22} col="white"/>
              : <div style={{width:20,height:20,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.7)"}}/>
            }
          </div>
        )}
      </div>
      <div data-list-row="1" style={{flex:1,minWidth:0}}>
        {(()=>{
          const t = song.title || "";
          const isLong = isCurrent && t.length > 22;
          return isLong ? (
            <div className="marquee-wrap" style={{fontWeight:800,fontSize:15,color:titleColorDynamic}}>
              <span className={isPlaying?"marquee-track running":"marquee-track"}
                style={{"--marquee-dist":`-${Math.min(t.length*7,220)}px`}}>
                <span>{t}</span><span aria-hidden="true">{t}</span>
              </span>
            </div>
          ) : (
            <div style={{ fontWeight:800, fontSize:15, color:titleColorDynamic,
              whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
              {t}
            </div>
          );
        })()}
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:3}}>
          {!selectionMode && (
            <button onClick={e=>{e.stopPropagation();onFav();}} style={{
              background:"none",border:"none",padding:0,display:"flex" }}>
              <svg viewBox="0 0 24 24"
                fill={song.favorite?dc:"none"}
                stroke={song.favorite?dc:subColor}
                strokeWidth="2" width="14" height="14">
                <path d={PATHS.heart}/>
              </svg>
            </button>
          )}
          <div style={{display:"flex",alignItems:"center",gap:3}}>
            <Ic n="clock" size={12} col={subColor}/>
            <span style={{fontSize:12,color:subColor}}>{fmt(song.duration)}</span>
          </div>
          <span style={{fontSize:12,color:subColor,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {song.artist}
          </span>
        </div>
      </div>
    </div>
  );
}, (prev, next) =>
  prev.song === next.song &&
  prev.isCurrent === next.isCurrent &&
  prev.isPlaying === next.isPlaying &&
  prev.isSelected === next.isSelected &&
  prev.selectionMode === next.selectionMode &&
  prev.dark === next.dark &&
  prev.dc === next.dc &&
  prev.swipeLeftEnabled === next.swipeLeftEnabled &&
  prev.swipeLeftAction === next.swipeLeftAction
);

/* Library Page dengan scroll detection dan sorting */
function LibraryPage({ songs, currentSong, isPlaying, onPlay, onFav, dc, dd, dl, dark, emptyMsg, onShowToast,
                       playlists, setPlaylists, queue, setQueue, setSongs, selectionMode, setSelectionMode,
                       selected, setSelected, sortBy, sortOrder, onImport, setBlacklist,
                       showSheet, setShowSheet,
                       scrollKey, scrollPositions, headerSlot, lang="id",
                       swipeLeftEnabled=false, swipeLeftAction="delete", onSwipeAction }) {
  const t = k => STRINGS[lang]?.[k] ?? STRINGS.id[k] ?? k;
  const [showNewPL,    setShowNewPL]    = useState(false);
  const scrollRef   = useRef(null);
  useScrollBounce(scrollRef);
  useScrollRestore(scrollRef, scrollKey, scrollPositions);
  const sortedSongs = useMemo(() => {
    const s = [...songs];
    if (sortBy === 'title') {
      s.sort((a, b) => {
        if (sortOrder === 'asc') return a.title.localeCompare(b.title);
        else return b.title.localeCompare(a.title);
      });
    } else if (sortBy === 'added') {
      s.sort((a, b) => {
        const da = a.dateAdded || a.id;
        const db = b.dateAdded || b.id;
        if (sortOrder === 'asc') return da - db;
        else return db - da;
      });
    } else if (sortBy === 'year') {
      s.sort((a, b) => {
        if (sortOrder === 'asc') return (a.year || 0) - (b.year || 0);
        else return (b.year || 0) - (a.year || 0);
      });
    }
    return s;
  }, [songs, sortBy, sortOrder]);

  const handleLongPress = id => {
    setSelectionMode(true);
    setSelected(new Set([id]));
  };
  const handleSelect = id => {
    setSelected(prev => {
      const n = new Set(prev);
      n.has(id) ? n.delete(id) : n.add(id);
      if (n.size === 0) setSelectionMode(false);
      return n;
    });
  };

  useDirectionalScrollAnim(scrollRef, [sortedSongs]);
  const { start, end, paddingTop, paddingBottom } = useVirtualList(scrollRef, sortedSongs.length);

  return (
    <div ref={scrollRef} style={{ padding:"4px 22px 170px", overflowY:"auto", height:"100%", position:"relative", willChange:"scroll-position" }}>
      {headerSlot}
      {!selectionMode && songs.length === 0 && (
        <p style={{color:"#bbb",textAlign:"center",marginTop:60,fontSize:15}}>{t("empty_no_songs")}</p>
      )}
      {sortedSongs.length===0 && <p style={{color:"#bbb",textAlign:"center",marginTop:60,fontSize:15}}>{emptyMsg||t("empty_no_songs_fallback")}</p>}

      {/* Virtual spacer atas */}
      {paddingTop > 0 && <div style={{height: paddingTop}}/>}

      {sortedSongs.slice(start, end).map((s, localI) => {
        const i = start + localI;
        return (
          <SongRow key={s.id} song={s} isCurrent={currentSong?.id===s.id}
            isPlaying={isPlaying && currentSong?.id===s.id}
            onPlay={()=>onPlay(s, sortedSongs)} onFav={()=>onFav(s.id)}
            dc={dc} dd={dd} dl={dl} dark={dark} delay={0}
            selectionMode={selectionMode} isSelected={selected.has(s.id)}
            onLongPress={handleLongPress} onSelect={handleSelect}/>
        );
      })}

      {/* Virtual spacer bawah */}
      {paddingBottom > 0 && <div style={{height: paddingBottom}}/>}
      {showSheet && (
        <ActionSheet
          selected={selected} songs={songs} playlists={playlists}
          dc={dc} dd={dd} dl={dl} dark={dark} lang={lang}
          onClose={()=>{ setShowSheet(false); }}
          onFav={()=>{ onFav(null, [...selected]); }}
          onDelete={()=>{ setSongs(s=>s.filter(x=>!selected.has(x.id))); setSelectionMode(false); setSelected(new Set()); }}
          onBlacklist={()=>{
            setBlacklist?.(b=>({ ...b, files:[...new Set([...b.files,...selected])] }));
            setSongs(s=>s); setSelectionMode(false); setSelected(new Set());
            const count = selected.size;
            if (count === 1) {
              const s = songs.find(x=>x.id===[...selected][0]);
              const short = (s?.title||"").length>18?(s.title.slice(0,18)+"…"):s?.title||"";
              onShowToast?.({ title:short, body:t("toast_hidden"), coverUrl:s?.coverUrl||null });
            } else {
              onShowToast?.(`${count} ${t("toast_songs_hidden")}`);
            }
          }}
          onQueue={()=>{
            const added = [...selected].filter(id=>!queue.includes(id));
            setQueue(q=>[...q,...added]);
            const count = added.length;
            if (count === 1) {
              const s = songs.find(x=>x.id===added[0]);
              const short = (s?.title||"").length>18?(s.title.slice(0,18)+"…"):s?.title||"";
              onShowToast?.({ title:short, body:t("toast_added_queue"), coverUrl:s?.coverUrl||null });
            } else if (count > 1) {
              onShowToast?.(`${count} ${t("toast_songs_added_queue")}`);
            }
          }}
          onAddPlaylist={(plId)=>{
            if(plId) {
              const pl = playlists.find(p=>p.id===plId);
              setPlaylists(p=>p.map(pl=>pl.id===plId?{...pl,songIds:[...new Set([...pl.songIds,...selected])]}:pl));
              const count = selected.size;
              if (count === 1) {
                const _s = songs.find(s=>s.id===[...selected][0]);
                const short = (_s?.title||"").length>18?(_s.title.slice(0,18)+"…"):_s?.title||"";
                onShowToast && onShowToast({ title: short, body: `${t("toast_to_playlist")} ${pl?.name||"playlist"}`, coverUrl: _s?.coverUrl||null });
              } else {
                onShowToast && onShowToast(`${count} ${t("toast_songs_to_playlist")} ${pl?.name||"playlist"}`);
              }
            }
          }}
          onCreatePlaylist={()=>{ setShowSheet(false); setShowNewPL(true); }}/>
      )}
      {showNewPL && (
        <CreatePlaylistModal
          dc={dc} dd={dd} dark={dark} lang={lang}
          onCancel={()=>setShowNewPL(false)}
          onConfirm={name=>{
            if(name) {
              setPlaylists(p=>[...p,{id:Date.now(),name,songIds:[...selected]}]);
              const count = selected.size;
              if (count === 1) {
                const s = songs.find(x=>x.id===[...selected][0]);
                const short = (s?.title||"").length>18?(s.title.slice(0,18)+"…"):s?.title||"";
                onShowToast?.({ title:short, body:`${t("toast_playlist_created")}: ${name}`, coverUrl:s?.coverUrl||null });
              } else {
                onShowToast?.(`${t("toast_playlist_created")}: ${name} (${count})`);
              }
            }
            setShowNewPL(false); setSelectionMode(false); setSelected(new Set());
          }}/>
      )}
    </div>
  );
}

/* Albums Page */
function AlbumCard({ album, songs, open, onToggle, currentSong, isPlaying, onPlay, onFav, dc, dl, dark, lang="id" }) {
  const t = k => STRINGS[lang]?.[k] ?? STRINGS.id[k] ?? k;
  const cBg = dark ? "#252525" : "white";
  const txt  = dark ? "#eee"   : "#1a1a1a";
  const { ref: zRef, onDown, onUp } = usePressZoom(0.97);
  const isOpen = open === album.name;
  const accentColor = album.color || dc;
  const accentDark  = album.songs[0]?.colorDark || dc;
  const openBg      = dark ? `${accentColor}20` : (album.colorLight || "#fff");
  const songDl      = dark ? `${accentColor}28` : (album.colorLight || dl);

  // Cover mosaic: ambil hingga 4 cover unik dari lagu album
  const coversRaw = album.songs.filter(s => s.coverUrl);
  const covers = [];
  const seenCv = new Set();
  for (const s of coversRaw) {
    if (!seenCv.has(s.coverUrl)) { seenCv.add(s.coverUrl); covers.push(s.coverUrl); }
    if (covers.length === 4) break;
  }
  const useMosaic = covers.length > 0;

  return (
    <div data-list-row="1" style={{ marginBottom:10 }}>
      <div ref={zRef} onPointerDown={onDown} onPointerUp={onUp} onPointerLeave={onUp}
        onClick={()=>onToggle(album.name)} style={{
        display:"flex", alignItems:"center", gap:14, padding:"12px 14px", borderRadius:20,
        background: isOpen ? openBg : cBg,
        cursor:"pointer",
        boxShadow: isOpen ? `0 4px 20px ${accentColor}33` : "0 2px 12px rgba(0,0,0,0.07)",
        border:`1.5px solid ${isOpen ? accentColor+"55" : "transparent"}`,
        transition:"all 0.3s cubic-bezier(0.34,1.1,0.64,1)",
      }}>
        <div style={{
          width:56, height:56, borderRadius:15, flexShrink:0, overflow:"hidden",
          position:"relative", boxShadow:`0 6px 18px ${accentColor}55`,
        }}>
          {useMosaic ? (
            covers.length === 1 ? (
              <img src={covers[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
            ) : (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",width:"100%",height:"100%"}}>
                {[0,1,2,3].map(i => (
                  covers[i]
                    ? <img key={i} src={covers[i]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                    : <div key={i} style={{background:`linear-gradient(135deg,${accentColor}88,${accentDark}88)`}}/>
                ))}
              </div>
            )
          ) : (
            <div style={{
              width:"100%", height:"100%",
              background:`linear-gradient(135deg,${accentColor},${accentDark})`,
              display:"flex", alignItems:"center", justifyContent:"center",
            }}>
              <Ic n="album" size={26} col="white"/>
            </div>
          )}
          {useMosaic && (
            <div style={{
              position:"absolute", bottom:0, left:0, right:0,
              background:"linear-gradient(to top, rgba(0,0,0,0.68) 60%, transparent)",
              padding:"4px 6px", display:"flex", alignItems:"flex-end",
            }}>
              <Ic n="album" size={13} col="white"/>
            </div>
          )}
        </div>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:15,color:txt,letterSpacing:-0.2}}>{album.name}</div>
          <div style={{fontSize:12,color: dark?"#888":"#888",marginTop:2,fontWeight:700}}>{album.artist} · {album.songs.length} {t("songs_count")}</div>
        </div>
        <div style={{
          width:28, height:28, borderRadius:"50%",
          background: isOpen ? `${accentColor}22` : "transparent",
          display:"flex", alignItems:"center", justifyContent:"center",
          transition:"all 0.3s ease",
        }}>
          <span style={{fontSize:18,color:isOpen?accentColor:"#ccc",display:"inline-block",transition:"transform 0.3s",
            transform:isOpen?"rotate(90deg)":"none",fontWeight:900}}>›</span>
        </div>
      </div>
      {isOpen && (
        <div style={{paddingLeft:8,paddingTop:4,maxHeight:320,overflowY:"auto"}}>
          {album.songs.map((s,i)=>(
            <SongRow key={s.id} song={songs.find(x=>x.id===s.id)||s}
              isCurrent={currentSong?.id===s.id} isPlaying={isPlaying && currentSong?.id===s.id}

              dc={accentColor} dd={accentDark}
              dl={songDl} dark={dark} delay={i*40}

          ))}
        </div>
      )}
    </div>
  );
}

function AlbumsPage({ albums, songs, onPlay, currentSong, isPlaying, onFav, dc, dl, dark, initialOpen, onMounted, sortBy, sortOrder, scrollKey, scrollPositions, lang="id" }) {
  const [open, setOpen] = useState(initialOpen || null);
  const scrollRef = useRef(null);
  useScrollBounce(scrollRef);
  useScrollRestore(scrollRef, scrollKey, scrollPositions);
  useEffect(() => { if (initialOpen) setOpen(initialOpen); onMounted?.(); }, []);
  const sorted = useMemo(() => {
    const dir = sortOrder === 'asc' ? 1 : -1;
    return [...albums].sort((a, b) => {
      if (sortBy === 'year') return dir * ((a.songs[0]?.year||0) - (b.songs[0]?.year||0));
      if (sortBy === 'added') return dir * (a.songs.length - b.songs.length);
      return dir * a.name.localeCompare(b.name);
    });
  }, [albums, sortBy, sortOrder]);
  useDirectionalScrollAnim(scrollRef, [sorted]);
  return (
    <div ref={scrollRef} style={{ padding:"4px 22px 170px", overflowY:"auto", height:"100%" }}>
      {sorted.map((album,i)=>(
        <AlbumCard key={album.name} album={album} songs={songs} open={open}
          onToggle={name=>setOpen(open===name?null:name)}
          currentSong={currentSong} isPlaying={isPlaying} onPlay={onPlay} onFav={onFav}
          dc={dc} dl={dl} dark={dark} lang={lang}/>
      ))}
    </div>
  );
}

function YearsPage({ songs, currentSong, isPlaying, onPlay, onFav, dc, dl, dark, scrollKey, scrollPositions, lang="id" }) {
  const t = k => STRINGS[lang]?.[k] ?? STRINGS.id[k] ?? k;
  const [open, setOpen] = useState(null);
  const scrollRef = useRef(null);
  useScrollBounce(scrollRef);
  useScrollRestore(scrollRef, scrollKey, scrollPositions);

  const groups = useMemo(() => {
    const map = {};
    songs.forEach(s => {
      const y = s.year ? String(s.year) : t("n_unknown_year");
      if (!map[y]) map[y] = [];
      map[y].push(s);
    });
    return Object.entries(map).sort(([a],[b]) => {
      const na = parseInt(a), nb = parseInt(b);
      if (!isNaN(na) && !isNaN(nb)) return nb - na; // tahun terbaru dulu
      if (isNaN(na)) return 1;
      if (isNaN(nb)) return -1;
      return 0;
    });
  }, [songs]);

  // Ringkasan: rentang tahun
  const yearNums = groups.map(([y]) => parseInt(y)).filter(n => !isNaN(n));
  const yearMin  = yearNums.length ? Math.min(...yearNums) : null;
  const yearMax  = yearNums.length ? Math.max(...yearNums) : null;
  const rangeStr = yearMin && yearMax
    ? (yearMin === yearMax ? String(yearMax) : `${yearMin} – ${yearMax}`)
    : null;

  useDirectionalScrollAnim(scrollRef, [groups]);
  return (
    <div ref={scrollRef} style={{ padding:"4px 22px 170px", overflowY:"auto", height:"100%" }}>
      {/* Header ringkasan tahun */}
      {rangeStr && (
        <div style={{
          marginBottom:18, padding:"12px 16px", borderRadius:18,
          background: dark ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.04)",
          display:"flex", alignItems:"center", justifyContent:"space-between",
        }}>
          <div>
            <div style={{fontSize:12,color:"#999",fontWeight:700,letterSpacing:0.5,textTransform:"uppercase"}}>{t("n_years")}</div>
            <div style={{fontSize:22,fontWeight:900,color:dc,letterSpacing:-1,marginTop:1}}>{rangeStr}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:"#aaa",fontWeight:700}}>{groups.length} {t("n_era")}</div>
            <div style={{fontSize:11,color:"#aaa",fontWeight:600,marginTop:2}}>{songs.length} {t("songs_count")}</div>
          </div>
        </div>
      )}
      {groups.map(([year, ySongs]) => (
        <YearCard key={year} year={year} songs={ySongs} open={open}
          onToggle={y => setOpen(open===y ? null : y)}
          currentSong={currentSong} isPlaying={isPlaying} onPlay={onPlay} onFav={onFav}
          dc={dc} dl={dl} dark={dark} lang={lang}/>
      ))}
    </div>
  );
}

function GenreCard({ genre, songs, open, onToggle, currentSong, isPlaying, onPlay, onFav, dc, dl, dark, lang="id" }) {
  const t = k => STRINGS[lang]?.[k] ?? STRINGS.id[k] ?? k;
  const cBg = dark ? "#252525" : "white";
  const txt  = dark ? "#eee"   : "#1a1a1a";
  const { ref: zRef, onDown, onUp } = usePressZoom(0.97);
  const isOpen = open === genre;
  const accent = songs[0]?.color || dc;
  const accentDark = songs[0]?.colorDark || dc;
  const openBg = dark ? `${accent}20` : (songs[0]?.colorLight || "#fff");
  const songDl = dark ? `${accent}28` : (songs[0]?.colorLight || dl);

  // Cover mosaic: ambil hingga 4 cover unik
  const coversRaw = songs.filter(s => s.coverUrl);
  const covers = [];
  const seenCv = new Set();
  for (const s of coversRaw) {
    if (!seenCv.has(s.coverUrl)) { seenCv.add(s.coverUrl); covers.push(s.coverUrl); }
    if (covers.length === 4) break;
  }
  const useMosaic = covers.length > 0;

  // Icon berdasarkan nama genre (overlay jika mosaic, isi jika tidak)
  const genreIcon = {
    rock:"electric_bolt", pop:"star", jazz:"music_note", classical:"piano",
    metal:"flash_on", folk:"nature", electronic:"sensors", dance:"nightlife",
    rnb:"radio", hip:"mic", rap:"mic", indie:"explore", ambient:"blur_on",
    anime:"interests", game:"sports_esports", games:"sports_esports",
    soundtrack:"movie", film:"movie", films:"movie", music:"music_note",
    alternative:"alt_route", country:"grass", blues:"water", reggae:"waves",
    punk:"bolt", soul:"favorite", gospel:"church", latin:"language",
    world:"public", children:"child_care", comedy:"sentiment_very_satisfied",
    holiday:"celebration",
  };
  const iconKey = Object.keys(genreIcon).find(k => genre.toLowerCase().includes(k)) || null;
  const iconName = iconKey ? genreIcon[iconKey] : "queue_music";

  return (
    <div data-list-row="1" style={{ marginBottom:10 }}>
      <div ref={zRef} onPointerDown={onDown} onPointerUp={onUp} onPointerLeave={onUp}
        onClick={()=>onToggle(genre)} style={{
        display:"flex", alignItems:"center", gap:14, padding:"12px 14px", borderRadius:20,
        background: isOpen ? openBg : cBg,
        cursor:"pointer",
        boxShadow: isOpen ? `0 4px 20px ${accent}33` : "0 2px 12px rgba(0,0,0,0.07)",
        border:`1.5px solid ${isOpen ? accent+"55" : "transparent"}`,
        transition:"all 0.3s cubic-bezier(0.34,1.1,0.64,1)",
      }}>
        {/* Thumbnail: cover mosaic atau gradient+icon */}
        <div style={{
          width:56, height:56, borderRadius:15, flexShrink:0, overflow:"hidden",
          position:"relative", boxShadow:`0 6px 18px ${accent}55`,
        }}>
          {useMosaic ? (
            covers.length === 1 ? (
              <img src={covers[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
            ) : (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",width:"100%",height:"100%"}}>
                {[0,1,2,3].map(i => (
                  covers[i]
                    ? <img key={i} src={covers[i]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                    : <div key={i} style={{background:`linear-gradient(135deg,${accent}88,${accentDark}88)`}}/>
                ))}
              </div>
            )
          ) : (
            <div style={{
              width:"100%",height:"100%",
              background:`linear-gradient(135deg,${accent},${accentDark})`,
              display:"flex",alignItems:"center",justifyContent:"center",
            }}>
              <Ic n={iconName} size={26} col="white"/>
            </div>
          )}
          {/* Icon overlay di pojok kiri bawah jika mosaic */}
          {useMosaic && (
            <div style={{
              position:"absolute", bottom:0, left:0, right:0,
              background:"linear-gradient(to top, rgba(0,0,0,0.68) 60%, transparent)",
              padding:"4px 6px 4px",
              display:"flex", alignItems:"flex-end",
            }}>
              <Ic n={iconName} size={13} col="white"/>
            </div>
          )}
        </div>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:15,color:txt,letterSpacing:-0.2}}>{genre}</div>
          <div style={{fontSize:12,color:"#888",marginTop:2,fontWeight:700}}>{songs.length} {t("songs_count")}</div>

      {isOpen && (
        <div style={{paddingLeft:8,paddingTop:4,maxHeight:320,overflowY:"auto"}}>
          {songs.map((s,i)=>(
            <SongRow key={s.id} song={s} isCurrent={currentSong?.id===s.id} isPlaying={isPlaying && currentSong?.id===s.id}
              onPlay={()=>onPlay(s, songs)} onFav={()=>onFav(s.id)}
              dc={accent} dd={accentDark} dl={songDl} dark={dark} delay={i*40}
              selectionMode={false} isSelected={false} onLongPress={()=>{}} onSelect={()=>{}}/>
          ))}
        </div>
      )}
    </div>
  );
}

function GenresPage({ songs, currentSong, isPlaying, onPlay, onFav, dc, dl, dark, scrollKey, scrollPositions, lang="id" }) {
  const t = k => STRINGS[lang]?.[k] ?? STRINGS.id[k] ?? k;
  const [open, setOpen] = useState(null);
  const scrollRef = useRef(null);
  useScrollBounce(scrollRef);
  useScrollRestore(scrollRef, scrollKey, scrollPositions);

  const groups = useMemo(() => {
    const map = {};
    songs.forEach(s => {
      const raw = s.genre || "";
      // Genre bisa berisi beberapa genre dipisah / atau ;
      const parts = raw.split(/[/;,]/).map(g => g.trim()).filter(Boolean);
      const keys = parts.length ? parts : [t("n_unknown_genre")];
      keys.forEach(g => {
        if (!map[g]) map[g] = [];
        map[g].push(s);
      });
    });
    return Object.entries(map).sort(([a,as],[b,bs]) => bs.length - as.length); // terbanyak dulu
  }, [songs]);

  useDirectionalScrollAnim(scrollRef, [groups]);
  return (
    <div ref={scrollRef} style={{ padding:"4px 22px 170px", overflowY:"auto", height:"100%" }}>
      {groups.map(([genre, gSongs]) => (
        <GenreCard key={genre} genre={genre} songs={gSongs} open={open}
          onToggle={g => setOpen(open===g ? null : g)}
          currentSong={currentSong} isPlaying={isPlaying} onPlay={onPlay} onFav={onFav}
          dc={dc} dl={dl} dark={dark} lang={lang}/>
      ))}
    </div>
  );
}

function FoldersPage({ folders, dc, dl, dark, initialOpen, onMounted, sortBy, sortOrder, onOpenFolder, scrollKey, scrollPositions, lang="id" }) {
  const scrollRef = useRef(null);
  useScrollBounce(scrollRef);
  useScrollRestore(scrollRef, scrollKey, scrollPositions);
  useEffect(() => { onMounted?.(); }, []);
  const sorted = useMemo(() => {
    const dir = sortOrder === 'asc' ? 1 : -1;
    return [...folders].sort((a, b) => {
      if (sortBy === 'added' || sortBy === 'year') return dir * (a.count - b.count);
      return dir * a.name.localeCompare(b.name);
    });
  }, [folders, sortBy, sortOrder]);
  useDirectionalScrollAnim(scrollRef, [sorted]);
  return (
    <div ref={scrollRef} style={{ padding:"4px 22px 170px", overflowY:"auto", height:"100%" }}>
      {sorted.map((f,i)=>(
        <FolderCard key={f.name} f={f} i={i} dc={dc} dl={dl} dark={dark}
          highlight={initialOpen===f.name} lang={lang}
          onOpen={() => onOpenFolder?.(f)}/>
      ))}
    </div>
  );
}

/* ======================================================
   SUCCESS OVERLAY
====================================================== */
function SuccessOverlay({ msg, variant, dc, dd, dark, onDone, bottomOffset }) {
  // msg bisa string biasa atau {title, body, coverUrl} untuk judul berwarna aksen + cover art
  const isRich    = msg && typeof msg === "object";
  const titleText = isRich ? msg.title    : null;
  const bodyText  = isRich ? msg.body     : msg;
  const coverUrl  = isRich ? msg.coverUrl : null;

  const isWarning = variant === "warning";
  const iconBg    = isWarning
    ? "linear-gradient(135deg,#f87171,#dc2626)"
    : `linear-gradient(135deg,${dc},${dd})`;
  const iconShadow = isWarning ? "0 2px 10px rgba(220,38,38,0.45)" : `0 2px 10px ${dc}66`;
  const border     = isWarning
    ? (dark ? "1px solid rgba(248,113,113,0.25)" : "1px solid rgba(220,38,38,0.15)")
    : (dark ? "1px solid rgba(255,255,255,0.08)" : "1px solid rgba(255,255,255,0.6)");
  const bgColor    = isWarning
    ? (dark ? "#2a1a1a" : "#fff5f5")
    : (dark ? "#252525" : "#ffffff");

  // Label: jika single song (isRich & ada title) → tampilkan judul lagu di semua jenis toast
  const isSingleSong = isRich && !!titleText;
  const labelContent = isSingleSong ? titleText : (isWarning ? "Peringatan" : "Sukses");
  const labelColor = isSingleSong
    ? (dark ? dc : dd)
    : (isWarning ? "#f87171" : dc);
  const labelIsTitle = isSingleSong;

  const [leaving, setLeaving] = useState(false);
  useEffect(() => {
    const t1 = setTimeout(() => setLeaving(true), 2000);
    const t2 = setTimeout(() => onDone(), 2280);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);
  return (
    <div className={leaving ? "success-out" : "success-in"} style={{
      position: "absolute",
      bottom: bottomOffset ?? 170,
      left: 0, right: 0, zIndex: 600,
      display: "flex", justifyContent: "center",
      pointerEvents: "none",
      transition: "bottom 0.3s cubic-bezier(0.34,1.56,0.64,1)",
    }}>
      <div style={{
        background: bgColor,
        backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
        borderRadius: 100,
        padding: "8px 16px 8px 10px",
        boxShadow: "0 4px 24px rgba(0,0,0,0.13),0 1px 4px rgba(0,0,0,0.06)",
        border,
        display: "inline-flex", alignItems: "center", gap: 10,
      }}>
        {coverUrl ? (
          <img src={coverUrl} alt="" style={{
            width:36, height:36, borderRadius:"50%", objectFit:"cover",
            flexShrink:0, boxShadow: iconShadow,
          }}/>
        ) : (
          <div style={{
            width: 32, height: 32, borderRadius: "50%",
            background: iconBg,
            display: "flex", alignItems: "center", justifyContent: "center",
            flexShrink: 0, boxShadow: iconShadow,
          }}>
            {isWarning ? (
              <svg width="15" height="15" viewBox="0 0 24 24" fill="white">
                <path d="M12 2L1 21h22L12 2zm0 3.5L20.5 19h-17L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/>
              </svg>
            ) : (
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            )}
          </div>
        )}
        <div style={{ minWidth: 0 }}>
          <div style={{
            fontSize: labelIsTitle ? 13 : 9,
            fontWeight: 800,
            color: labelColor,
            letterSpacing: labelIsTitle ? 0 : 1,
            textTransform: labelIsTitle ? "none" : "uppercase",
            marginBottom: 1,
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
            maxWidth: 220,
          }}>{labelContent}</div>
          {!labelIsTitle && titleText && (
            <div style={{
              fontSize: 13, fontWeight: 800,
              fontFamily: "'Nunito', sans-serif",
              color: labelColor,
              whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
              maxWidth: 220,
            }}>{titleText}</div>
          )}
          <div style={{
            fontSize: 13, fontWeight: 700,
            fontFamily: "'Nunito', sans-serif",
            color: dark ? "rgba(240,240,240,0.92)" : "rgba(30,30,30,0.88)",
            whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
            maxWidth: 220,
          }}>{bodyText}</div>
        </div>
      </div>
    </div>
  );
}

const SettingsPage = React.memo(function SettingsPage({ onSub, dc, dl, dd, dark, lang="id" }) {
  const t = k => STRINGS[lang]?.[k] ?? STRINGS.id[k] ?? k;
  const bg  = dark ? "#111"   : "#fffdf9";
  const txt = dark ? "#eee"   : "#1a1a1a";
  const sub = dark ? "#888"   : "#aaa";
  const cBg = dark ? "#252525": "white";
  const scrollRef = useRef(null);
  useScrollBounce(scrollRef);
  const opts = [
    { id:"tema",    label:t("s_display"),  icon:"sun",     desc:t("s_display_desc")  },
    { id:"gesture", label:t("s_gesture"),  icon:"gesture", desc:t("s_gesture_desc")  },
    { id:"navbar",  label:t("s_navbar"),   icon:"list",    desc:t("s_navbar_desc")   },
    { id:"audio",   label:t("s_audio"),    icon:"speaker", desc:t("s_audio_desc")    },
    { id:"about",   label:t("s_about"),    icon:"info",    desc:t("s_about_desc")    },
  ];
  return (
    <div ref={scrollRef} style={{ padding:"4px 22px 190px", overflowY:"auto", height:"100%" }}>
      {opts.map((o,i)=>(
        <div key={o.id} onClick={()=>onSub(o.id)} style={{
          display:"flex",alignItems:"center",gap:14,padding:"10px 12px",
          borderRadius:20,marginBottom:6,cursor:"pointer",
          background: cBg,
          border:"1.5px solid transparent",
          boxShadow:"0 2px 12px rgba(0,0,0,0.07)",
          animation:`fadeIn 0.35s ease ${i*60}ms both`,

  );
}

const AudioPage = React.memo(function AudioPage({ dc, dd, dl, dark, onImport, onImportFolder, onRescan, onOutputChange=async()=>{}, crossfadeDuration=0, setCrossfadeDuration, playbackSpeed=1, setPlaybackSpeed, songs=[], blacklist={folders:[],files:[]}, setBlacklist=()=>{}, currentSong=null, lang="id" }) {
  const t = k => STRINGS[lang]?.[k] ?? STRINGS.id[k] ?? k;
  const EQ_BANDS = ["60Hz","170Hz","310Hz","600Hz","1kHz","3kHz","6kHz","12kHz"];
  const [eq,setEq]           = useState({"60Hz":0,"170Hz":0,"310Hz":2,"600Hz":0,"1kHz":-1,"3kHz":2,"6kHz":1,"12kHz":0});
  const [output,setOutput]   = useState("");
  const [audioDevices,setAudioDevices] = useState([]);
  const [sinkErr,setSinkErr] = useState("");

  // Enumerate real audio output devices
  useEffect(()=>{
    const load = async () => {
      if (!navigator.mediaDevices?.enumerateDevices) return;
      try {
        const devs = await navigator.mediaDevices.enumerateDevices();
        const outputs = devs.filter(d => d.kind === "audiooutput");
        setAudioDevices(outputs);
        if (outputs.length > 0 && !output) setOutput(outputs[0].deviceId);
      } catch(e) { console.warn("enumerateDevices:", e); }
    };
    load();
    navigator.mediaDevices?.addEventListener?.("devicechange", load);
    return () => navigator.mediaDevices?.removeEventListener?.("devicechange", load);
  }, []);
  const [scanning,setScanning]= useState(false);
  const [scanMsg,setScanMsg] = useState("");
  const bg  = dark ? "#111"   : "#fffdf9";
  const cBg = dark ? "#1e1e1e": "white";
  const txt  = dark ? "#eee"  : "#1a1a1a";
  const sub  = dark ? "#999"  : "#666";
  // Tombol inactive: di dark mode pakai bg transparan agar tidak "terbalik"
  const btnInactiveBg  = dark ? "rgba(255,255,255,0.07)" : dl;
  const btnInactiveTxt = dark ? "rgba(255,255,255,0.72)" : dd;
  const btnInactiveBdr = dark ? "1px solid rgba(255,255,255,0.10)" : "1px solid transparent";
  const startRescan = async () => {
    if (!onRescan) return;
    if (!window.showDirectoryPicker) {
      setScanMsg(t("a_scan_unsupported"));
      return;
    }
    setScanning(true);
    setScanMsg(t("a_scan_scanning"));
    try {
      const result = await onRescan((done, total, fileName) => {
        setScanMsg(`${t("a_scan_processing")} ${done}/${total}: ${fileName.length>28?fileName.slice(0,28)+"…":fileName}`);
      });
      if (result.noHandles) {
        setScanMsg(t("a_scan_no_folders"));
      } else if (result.newCount === 0) {
        setScanMsg(t("a_scan_up_to_date"));
      } else {
        setScanMsg(t("a_scan_done"));
      }
    } catch(e) {
      setScanMsg(t("a_scan_fail") + (e.message || "Unknown error"));
    }
    setScanning(false);
  };
  const scrollRef = useRef(null);
  useScrollBounce(scrollRef);
  return (
    <div ref={scrollRef} style={{ padding:"4px 22px 190px", overflowY:"auto", height:"100%" }}>
      <div style={{display:"contents"}}>

      {/* Playback Speed */}
      <AudioCard cBg={cBg} idx={0}>
        <AudioSec dc={dc} txt={txt} icon="bolt" label={t("a_speed")}/>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
          {[0.5, 0.75, 1, 1.25, 1.5, 2].map(s=>(
            <button key={s} onClick={()=>setPlaybackSpeed(s)} style={{
              padding:"9px 0", borderRadius:12, border:"none",
              background: playbackSpeed===s ? dc : btnInactiveBg,
              color: playbackSpeed===s ? "white" : btnInactiveTxt,
              border: playbackSpeed===s ? "1px solid transparent" : btnInactiveBdr,
              fontFamily:"inherit", fontWeight:800, fontSize:13,
              cursor:"pointer", transition:"all 0.18s",
              flex:"1 1 calc(33% - 8px)",
            }}>
{s}×{s===1?` (${t("a_normal")})`:""}
            </button>
          ))}
        </div>
        <p style={{fontSize:12,color:sub,lineHeight:1.7}}>
          {t("a_active")}: <strong style={{color:dc}}>{playbackSpeed}×</strong>
          {playbackSpeed!==1&&<span style={{color:"#aaa"}}> · {t("a_speed_tip")}</span>}
        </p>
      </AudioCard>

      {/* Crossfade */}
      <AudioCard cBg={cBg} idx={1}>
        <AudioSec dc={dc} txt={txt} icon="repeat" label={t("a_crossfade")}/>
        <p style={{fontSize:12,color:sub,lineHeight:1.7,marginBottom:12}}>{t("a_crossfade_desc")}</p>
        {/* Waveform visualizer */}
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:34,marginBottom:14,padding:"0 4px"}}>
          {[...Array(14)].map((_,i)=>{
            const fo = Math.max(0.05, 1 - i/13);
            const fi = Math.min(1, i/13);
            const on = crossfadeDuration > 0;
            return (
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",gap:2}}>
                <div style={{height:Math.round(fo*22)+"px",borderRadius:2,transition:"height 0.3s,background 0.3s",
                  background:on?`${dd}${Math.round(fo*255).toString(16).padStart(2,"0")}`:(dark?"rgba(255,255,255,0.14)":"#e0dbd4")}}/>
                <div style={{height:on?Math.round(fi*22)+"px":"2px",borderRadius:2,transition:"height 0.3s,background 0.3s",
                  background:on?`${dc}${Math.round(fi*255).toString(16).padStart(2,"0")}`:"transparent"}}/>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
          {[0,2,4,6,8,10].map(s=>(
            <button key={s} onClick={()=>setCrossfadeDuration(s)} style={{
              padding:"9px 0", borderRadius:12, border:"none",
              background: crossfadeDuration===s ? dc : btnInactiveBg,
              color: crossfadeDuration===s ? "white" : btnInactiveTxt,
              border: crossfadeDuration===s ? "1px solid transparent" : btnInactiveBdr,
              fontFamily:"inherit", fontWeight:800, fontSize:13,
              cursor:"pointer", transition:"all 0.18s",
              flex:"1 1 calc(33% - 8px)",
            }}>
{s===0?t("a_off"):`${s} ${t("a_sec_short")}`}
            </button>
          ))}
        </div>
        <p style={{fontSize:12,color:sub,lineHeight:1.7}}>
          {crossfadeDuration===0
            ? t("a_xfade_off")
            : <><strong style={{color:dc}}>{crossfadeDuration} {t("a_xfade_on_sec")}</strong> {t("a_xfade_on_tip")} {crossfadeDuration} {t("a_xfade_on_end")}</>}
        </p>
      </AudioCard>

      <AudioCard cBg={cBg} idx={2}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <AudioSec dc={dc} txt={txt} icon="speaker" label={t("a_eq")}/>
          <span style={{fontSize:10,color:"#aaa",fontWeight:700,fontStyle:"italic",flexShrink:0,marginLeft:8}}>{t("a_eq_sim")}</span>
        </div>
        <div style={{display:"flex",alignItems:"flex-end",gap:5,height:52,marginBottom:14,justifyContent:"space-between"}}>
          {EQ_BANDS.map(b=>{ const v=eq[b]; const h=Math.max(3,((v+12)/24)*50); return (
            <div key={b} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <div style={{width:"100%",height:h,background:`linear-gradient(to top,${dd},${dc})`,borderRadius:4,transition:"height 0.22s ease",minHeight:3}}/>
              <span style={{fontSize:7,color:sub,whiteSpace:"nowrap"}}>{b}</span>
            </div>
          );})}
        </div>
        {EQ_BANDS.map(b=>(
          <div key={b} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
            <span style={{fontSize:11,color:sub,width:38,textAlign:"right",flexShrink:0}}>{b}</span>
            <input type="range" className="eq" min={-12} max={12} step={1} value={eq[b]}
              style={{background:`linear-gradient(to right,${dc} ${((eq[b]+12)/24)*100}%,#ece8e0 ${((eq[b]+12)/24)*100}%)`,"--dc":dc}}
              onChange={e=>setEq(p=>({...p,[b]:+e.target.value}))}/>
            <span style={{fontSize:11,color:sub,width:30,flexShrink:0}}>{eq[b]>0?"+":""}{eq[b]}dB</span>
          </div>
        ))}
        <button onClick={()=>setEq(Object.fromEntries(EQ_BANDS.map(b=>[b,0])))}
          style={{marginTop:8,width:"100%",padding:9,borderRadius:12,border:"none",background:dl,color:dd,fontFamily:"inherit",fontWeight:800,fontSize:13}}>
          {t("a_eq_reset")}
        </button>
      </AudioCard>
      <AudioCard cBg={cBg} idx={3}>
        <AudioSec dc={dc} txt={txt} icon="speaker" label={t("a_resampler")}/>
        {currentSong ? (
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:dark?"#1e1e1e":dl,borderRadius:14}}>
              <div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg,${dc},${dd})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <Ic n="speaker" size={20} col="white"/>
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:800,color:txt,marginBottom:2}}>{currentSong.title||t("meta_unknown")}</div>
                <div style={{fontSize:12,color:sub}}>
                  {currentSong.sampleRate ? (
                    <><strong style={{color:dc}}>{(currentSong.sampleRate/1000).toFixed(1)} kHz</strong> · {currentSong.format||currentSong.ext?.toUpperCase()||"Audio"}</>
                  ) : (
                    <span style={{color:"#bbb"}}>{t("a_sr_unavail")}</span>
                  )}
                </div>
              </div>
            </div>
            <p style={{fontSize:11,color:sub,lineHeight:1.7,margin:0}}>{t("a_sr_note")}</p>
          </div>
        ) : (
          <p style={{fontSize:13,color:sub,lineHeight:1.7}}>
            {t("a_sr_play")}

        )}
      </AudioCard>
      <AudioCard cBg={cBg} idx={4}>
        <AudioSec dc={dc} txt={txt} icon="output" label={t("a_output")}/>
        {!HTMLAudioElement.prototype.setSinkId ? (

          return (
            <>
              <div style={{fontSize:12,fontWeight:800,color:sub,letterSpacing:0.5,marginBottom:8,textTransform:"uppercase"}}>

            marginTop:14, width:"100%", padding:"10px 0", borderRadius:12,

            color:"#ff4444", fontFamily:"inherit", fontWeight:800, fontSize:13, cursor:"pointer",
          }}>

        {scanMsg&&<div style={{padding:"10px 14px",borderRadius:12,background:dl,marginBottom:12,fontSize:13,color:dd,fontWeight:700,animation:"fadeIn 0.2s ease"}}>{scanMsg}</div>}
        <button onClick={startRescan} disabled={scanning} style={{width:"100%",padding:12,borderRadius:14,border:"none",background:scanning?"#ddd":dc,color:scanning?"#888":"white",fontFamily:"inherit",fontWeight:800,fontSize:14,cursor:scanning?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
          <span style={{display:"inline-flex",animation:scanning?"spin 0.8s linear infinite":"none"}}><Ic n="refresh" size={18} col={scanning?"#888":"white"}/></span>
{scanning?t("a_scanning"):t("a_start_rescan")}
        </button>
      </AudioCard>
      </div>{/* end mountKey wrapper */}
    </div>

});

function ArtistsPage({ songs, currentSong, isPlaying, onPlay, onFav, dc, dd, dl, dark, initialOpen, onMounted, sortBy, sortOrder, scrollKey, scrollPositions, lang="id" }) {

  useEffect(() => { if (initialOpen) setOpenArtist(initialOpen); onMounted?.(); }, []);
  const artists = useMemo(() => {
    const map = {};
    songs.forEach(s => {
      if (!map[s.artist]) map[s.artist] = [];
      map[s.artist].push(s);
    });
    const list = Object.entries(map).map(([name, songs]) => ({ name, songs }));
    const dir = sortOrder === 'asc' ? 1 : -1;
    return list.sort((a, b) => {
      if (sortBy === 'added' || sortBy === 'year') return dir * (a.songs.length - b.songs.length);

/* ── Helper: format waktu relatif ──────────────────────────────────────── */
function fmtRelTime(ts, lang="id") {
  const t = k => STRINGS[lang]?.[k] ?? STRINGS.id[k] ?? k;
  if (!ts) return null;
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 30)   return t("rt_just_now");
  if (diff < 90)   return t("rt_1min");
  if (diff < 3600) return t("rt_nmin").replace("{n}", Math.round(diff/60));
  if (diff < 7200) return t("rt_1hr");
  if (diff < 86400) return t("rt_nhr").replace("{n}", Math.round(diff/3600));
  if (diff < 172800) return t("rt_yesterday");
  return t("rt_nday").replace("{n}", Math.round(diff/86400));
}

  const t = k => STRINGS[lang]?.[k] ?? STRINGS.id[k] ?? k;

  useScrollRestore(scrollRef, scrollKey, scrollPositions);

  const entries = useMemo(() => {
    const tiers = [
      { min:20, label:t("mp_tier_top") },
      { min:10, label:t("mp_tier_very") },
      { min:5,  label:t("mp_tier_often") },
      { min:2,  label:t("mp_tier_few") },
    ];
    const sorted = Object.entries(playCounts)
      .sort(([,a],[,b]) => b - a)
      .map(([id, count]) => ({ song: songs.find(s=>s.id===Number(id)), count }))

  const songList = useMemo(() =>
    entries.filter(e=>e.type==="song").map(e=>e.song)

            isCurrent={currentSong?.id===e.song.id}
            isPlaying={isPlaying && currentSong?.id===e.song.id}

/* ======================================================
   DRAG-REORDER HOOK — touch-based, tidak butuh library
====================================================== */
function useDragReorder(items, onReorder) {
  const dragIdx    = useRef(null);
  const overIdx    = useRef(null);
  const startY     = useRef(0);
  const itemEls    = useRef([]);
  const itemsRef   = useRef(items);
  const reorderRef = useRef(onReorder);
  const ROW        = 72;

  // Selalu update ref tanpa membuat ulang callback
  itemsRef.current   = items;
  reorderRef.current = onReorder;

  const onDragStart = useCallback((i, e) => {
    dragIdx.current = i;
    overIdx.current = i;
    startY.current  = e.touches?.[0]?.clientY ?? e.clientY;
    if (itemEls.current[i]) {
      itemEls.current[i].style.opacity   = "0.45";
      itemEls.current[i].style.transform = "scale(0.97)";
    }
    e.stopPropagation();
  }, []); // stabil — tidak ada dep

  const onDragMove = useCallback((e) => {
    if (dragIdx.current === null) return;
    const y       = e.touches?.[0]?.clientY ?? e.clientY;
    const dy      = y - startY.current;
    const len     = itemsRef.current.length;
    const newOver = Math.max(0, Math.min(len - 1, dragIdx.current + Math.round(dy / ROW)));
    if (newOver !== overIdx.current) {
      overIdx.current = newOver;
      itemEls.current.forEach((el, idx) => {
        if (!el) return;
        el.style.transform = idx === dragIdx.current ? "scale(0.97)"
          : idx === newOver ? "translateY(4px) scale(1.01)" : "";
      });
    }
    e.preventDefault();
  }, []); // stabil — baca items via ref

  const onDragEnd = useCallback(() => {
    if (dragIdx.current === null) return;
    const from = dragIdx.current;
    const to   = overIdx.current ?? from;
    itemEls.current.forEach(el => {
      if (el) { el.style.opacity = ""; el.style.transform = ""; }
    });
    dragIdx.current = null;
    overIdx.current = null;
    if (from !== to) {
      const next = [...itemsRef.current];
      const [moved] = next.splice(from, 1);
      next.splice(to, 0, moved);
      reorderRef.current(next);
    }
  }, []); // stabil — baca items & onReorder via ref

  // setItemRef: satu fungsi stabil yang mengembalikan callback per-index
  const setItemRef = useCallback((i) => (el) => { itemEls.current[i] = el; }, []);

  return { onDragStart, onDragMove, onDragEnd, setItemRef };
}

/* Now Playing Page */
function NowPlayingPage({ song, isPlaying, progress, onSeek, onPlay, onNext, onPrev, onClose, onSwipeClose, onFav, onSettings, onNavigate, dc, dd, dl, lyrics, getAudioTime, closing, dark, queue, setQueue, songs, onPlayFromQueue, shuffle, setShuffle, repeat, setRepeat, playlists, setPlaylists, sleepTimer, onSetSleepTimer, onCancelSleepTimer, coverRadius=28, boltKey=0, playbackSpeed=1, setPlaybackSpeed, onSetLyricsOverride, amoled=false, amoledShadows=false, plainLyricsSize="auto", keepScreenOn=true, lang="id" }) {
  const t = k => STRINGS[lang]?.[k] ?? STRINGS.id[k] ?? k;
  const [showMore,       setShowMore]       = useState(false);
  const lrcFileRef = useRef(null);

  // ── Standalone LRC/Enhanced-LRC parser (mirrors processOne logic) ─────────
  const parseLrcFile = useCallback((text) => {
    if (!song) return;
    const rawLines = text.split(/\r?\n/);
    const lines    = rawLines.filter(l => l.trim());
    const lrcRe         = /^\[(\d{1,2}):(\d{2})[\.:,](\d{2,3})\]\s*(.*)$/;
    const enhancedLrcRe = /<\d{1,2}:\d{2}\.\d{2,3}>/;
    const isEnhancedLrc = lines.some(l => enhancedLrcRe.test(l));
    const isLrc         = !isEnhancedLrc && lines.some(l => lrcRe.test(l.trim()));
    let parsed = [];

    if (isEnhancedLrc) {
      parsed = parseEnhancedLrc(text);
    } else if (isLrc) {
      parsed = parseLrc(text);
    } else {
      // plain text — store as isLine
      parsed = rawLines.map(line => ({ t: null, w: line.trim(), isLine: true }));
    }

    if (parsed.length) {
      onSetLyricsOverride(song.id, parsed);
      return parsed.length;
    }
    return 0;
  }, [song, onSetLyricsOverride]);
  const [showLyrics,     setShowLyrics]     = useState(false);
  const wakeLockRef = useRef(null); // Screen Wake Lock untuk halaman lirik
  const [lyricsClosing,  setLyricsClosing]  = useState(false);
  const [lyrFmtTooltip,  setLyrFmtTooltip] = useState(false);
  const [npReady,        setNpReady]        = useState(false);
  useEffect(() => { setNpReady(false); const t = setTimeout(() => setNpReady(true), 420); return () => clearTimeout(t); }, [boltKey]);
  const [heartPulse,     setHeartPulse]     = useState(false);
  const [showQueue,      setShowQueue]      = useState(false);
  const [showSleepTimer, setShowSleepTimer] = useState(false);
  const [showAddPL,     setShowAddPL]     = useState(false);
  const [showInfoSheet, setShowInfoSheet] = useState(false);
  const [infoSheetClosing, setInfoSheetClosing] = useState(false);

  // ── Word-level lyrics sync (DOM-driven, RAF, closure-local state) ─────────
  const lyricsRafRef   = useRef(null);
  const isPlayingRef   = useRef(isPlaying);
  useEffect(() => { isPlayingRef.current = isPlaying; }, [isPlaying]);

  useEffect(() => {
    if (!showLyrics || !getAudioTime) return;
    if (lyrics.length > 0 && lyrics[0]?.isLine === true && lyrics[0]?.t == null) return;

    // ── Build lines: LRC per-baris bypasses phrase grouping ─────────────
    const isLrcMode = lyrics.length > 0 && lyrics[0]?.isLrc === true;
    const timed = lyrics.filter(l => l.t != null && l.w && l.role !== 'bg');
    if (!timed.length) return;
    const phrases = [];
    let cur = [timed[0]];
    for (let i = 1; i < timed.length; i++) {
      if (timed[i].t - timed[i-1].t > 1.8 || timed[i].lineStart) { phrases.push(cur); cur = [timed[i]]; }
      else cur.push(timed[i]);
    }
    if (cur.length) phrases.push(cur);

    // ── Secondary split: break phrase at capital-starting word
    // preceded by a non-capital word (sentence boundary heuristic).
    // "New York" stays together (both cap), "tutorial When" splits (lower→cap).
    // Single-letter words like "I" are treated as always-split triggers.
    const splitByCapital = (phrase) => {
      const VOCATIVES = new Set("I,You,He,She,It,We,They,Me,Him,Her,Us,Them,My,Your,His,Its,Our,Their,The,A,An,This,That,These,Those,Each,Every,All,Some,Any,No,Both,Either,Neither,And,But,Or,So,Yet,For,Nor,If,When,While,As,Than,That,Though,Although,Because,Since,Until,Unless,After,Before,Whether,Whereas,Once,Where,In,On,At,To,By,Of,Up,Down,Out,Off,Into,Onto,From,With,Without,Through,Across,Along,Around,Over,Under,About,Above,Below,Between,Behind,Inside,Outside,Just,Still,Only,Never,Ever,Always,Again,Already,Almost,Even,Also,Too,Now,Then,Here,There,Together,Apart,Away,Back,Forward,Home,Right,Left,Far,Near,Close,Oh,Ooh,Oooh,Ah,Ahh,Aah,Hey,Hi,Yo,Yeah,Yea,Nah,Whoa,Wow,Hmm,Hm,Um,Uh,Oops,Shh,Hush,Aww,Aw,Ugh,Eww,Ew,Eh,Mhm,Mmm,No,Yes,Please,Sorry,Wait,Baby,Babe,Honey,Darling,Love,Dear,Boy,Girl,Man,Woman,Lord,God,Well,Be,Been,Being,Is,Are,Was,Were,Am,Have,Has,Had,Do,Does,Did,Will,Would,Could,Should,Might,Must,Shall,May,Can,Let,Make,Take,Give,Keep,Hold,Know,Think,Feel,Need,Want,See,Hear,Say,Tell,Ask,Try,Get,Go,Come,Run,Stay,Leave,Stop,Start,Keep,Begin,End,Fall,Rise,Grow,Show,Find,Lose,Like,Love,Hate,Miss,Forget,Remember,Believe,Understand,Realize,Imagine".split(","));
      const out = [];
      let cur = [phrase[0]];
      for (let i = 1; i < phrase.length; i++) {
        const w    = phrase[i].w;
        const prev = phrase[i - 1].w;
        // Abaikan kata non-Latin (mis. Korea, Jepang)
        if (!/[A-Za-z]/.test(w) || !/[A-Za-z]/.test(prev)) { cur.push(phrase[i]); continue; }
        const curCap       = /^[A-Z]/.test(w);
        const prevCap      = /^[A-Z]/.test(prev);
        const isVocative   = VOCATIVES.has(w.replace(/[^A-Za-z]/g, ""));
        const prevEndsComma = prev.endsWith(",");
        // Split: kapital muncul setelah huruf kecil,
        // BUKAN sapaan/panggilan, BUKAN setelah koma (lanjutan frasa)
        if (curCap && !prevCap && !isVocative && !prevEndsComma) {
          out.push(cur); cur = [phrase[i]];
        } else {
          cur.push(phrase[i]);
        }
      }
      if (cur.length) out.push(cur);
      return out;
    };

    // Flatten phrase → sub-lines via capital split, then merge short lines

    // ── Merge short lines: join consecutive lines that are too short
    // (avoids single-word lines on slow songs like "lovely")
    // Only merges if the time gap between consecutive lines < MAX_GAP seconds.
    const mergeShortLines = (lines) => {
      const MIN_WORDS = 3;   // target minimum words per line
      const MAX_GAP   = 3.5; // don't merge across pauses longer than this
      if (lines.length <= 1) return lines;
      const out = [lines[0].slice()];
      for (let i = 1; i < lines.length; i++) {
        const prev = out[out.length - 1];
        const curr = lines[i];
        const gap  = curr[0].t - prev[prev.length - 1].t;
        // Jangan gabungkan jika baris ini adalah batas asli LRC (lineStart)
        if (curr[0].lineStart) { out.push(curr.slice()); continue; }
        if (gap >= MAX_GAP) { out.push(curr.slice()); continue; }
        // Bidirectional: merge jika curr ATAU prev terlalu pendek
        if (curr.length < MIN_WORDS || prev.length < MIN_WORDS) {
          out[out.length - 1] = prev.concat(curr);
        } else {
          out.push(curr.slice());
        }
      }
      return out;
    };

    const lines = isLrcMode
      ? timed.map(w => [w])
      : mergeShortLines(phrases.flatMap(ph => splitByCapital(ph)));

    // ── Flat word list — main (v1/v2) dan bg terpisah ───────────────────
    const hasBg = lyrics.some(w => w.role === 'bg' && w.t != null && w.w);
    const flat = [];
    lines.forEach((ln, li) => {
      const totalChars = ln.reduce((s, w) => s + w.w.length, 0) || 1;
      let cum = 0;
      ln.forEach(w => {
        cum += w.w.length;
        flat.push({ t: w.t, li, fillPct: Math.round(cum / totalChars * 100), wLen: w.w.length, endT: w.endT ?? null, role: w.role || 'v1' });
      });
    });
    // ── avgDur: rata-rata jarak antar timestamp kata → deteksi tempo lagu ─
    // Dipakai untuk memilih easing animasi bg-zoom (slow/normal/fast)
    // ── Role-split arrays for independent binary search per voice ─────────
    // flatV1/flatV2: setiap entry menyimpan {wi: index di flat, t, li, fillPct, endT}
    const flatV1 = [], flatV2 = [];
    flat.forEach((w, wi) => {
      if (w.role === 'v2') flatV2.push({ wi, t: w.t, li: w.li, fillPct: w.fillPct, endT: w.endT });
      else                 flatV1.push({ wi, t: w.t, li: w.li, fillPct: w.fillPct, endT: w.endT });
    });
    const hasV2Words = flatV2.length > 0;
    const avgDur = flat.length > 1
      ? (flat[flat.length - 1].t - flat[0].t) / (flat.length - 1)
      : 0.4;
    // < 0.25s → fast (snappy), > 0.6s → slow (gentle), sisanya → normal
    const bgSpeedClass = avgDur < 0.25 ? 'bg-speed-fast' : avgDur > 0.6 ? 'bg-speed-slow' : '';
    let bgSpeedApplied = false; // diterapkan lazy saat box tersedia

    // flatBg: dari lyrics langsung (bukan timed yang sudah exclude bg)
    const bgWords = lyrics.filter(l => l.t != null && l.w && l.role === 'bg').sort((a,b) => a.t - b.t);
    const flatBg = bgWords.map((w, bgi) => ({ t: w.t, bgi, endT: w.endT ?? null }));
    // bgFlatLi: bgi → li (diisi setelah render, via data-bgi → closest data-line parent)
    // Dibangun saat pertama kali box tersedia (lazy, frame pertama)
    let bgFlatLi = null; // { [bgi]: li }

    // ── applyAll: set every DOM element to its correct class ─────────────
    // Called on open (mid-song) and after seek / speed change
    const setFill = (box, li, pct) => {
      const el = box.querySelector(`[data-line="${li}"]`);
      if (el) el.style.setProperty('--fill-pct', pct + '%');
    };
    const clearFill = (box, li) => {
      const el = box.querySelector(`[data-line="${li}"]`);
      if (el) el.style.removeProperty('--fill-pct');
    };

    const applyAll = (box, wi, li, wiV2flat = -1, liV2 = -1) => {
      if (!isLrcMode) box.querySelectorAll('[data-wi]').forEach(el => {

        el.className = (i < cur ? 'lw lw-past' : i === cur ? 'lw lw-active' : 'lw lw-future') + r;
      });
      // Reset all bg elements to future on seek/jump
      if (hasBg) box.querySelectorAll('[data-bgi]').forEach(el => {
        const i = +el.dataset.bgi;
        const t = flatBg[i]?.t ?? 0;
        el.className = t < (wi >= 0 ? flat[wi]?.t ?? 0 : 0) ? 'lw lw-bg-past' : 'lw lw-bg-future';
      });
      box.querySelectorAll('[data-line]').forEach(el => {
        const i    = +el.dataset.line;
        const isV2 = el.dataset.role === 'v2';
        const r2   = isV2 ? ' ll-role-v2' : '';
        const activeLi = isV2 ? liV2 : li;
        const activeWi = isV2 ? wiV2flat : wi;
        el.className = (i < activeLi ? 'll ll-past' : i === activeLi ? (dark ? 'll ll-active ll-active-dark' : (hasCover ? 'll ll-active ll-active-light' : 'll ll-active ll-active-nocover')) : 'll ll-future') + r2;

    const scrollTo = (box, li) => {

      const el = box.querySelector(`[data-line="${li}"]`);
      if (!el) return;

    };
    // Track sentuhan user — lerp dibatalkan saat user scroll manual atau saat pause
    const onLyricsTouch    = () => { box._userScrolling = true; box._scrollTarget = null; };

    let prevLi       = -1;
    let prevT        = -1;   // -1 = first frame

    let activeWordEl = null; // ref langsung ke elemen kata aktif — update --lw-p tiap frame
    // Trailing word — kata sebelumnya yg masih dalam endT saat kata baru curi start
