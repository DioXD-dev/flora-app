            while (p + 8 <= end) {
              let size = dv.getUint32(p);
              const type = String.fromCharCode(data[p+4],data[p+5],data[p+6],data[p+7]);
              if (size === 0) size = end - p;
              if (size < 8) break;
              if (type === target) return { start: p + 8, end: p + size };
              p += size;
            }
            return null;
          };
          const moov = findBox(u8, buf, 0, u8.length, 'moov');
          if (!moov) return resolve(null);
          const mvhd = findBox(u8, buf, moov.start, moov.end, 'mvhd');
          if (!mvhd) return resolve(null);
          const version = u8[mvhd.start];
          let timescale, durationVal;
          if (version === 1) {
            // 8 bytes creation + 8 bytes modification + 4 bytes timescale + 8 bytes duration
            timescale   = buf.getUint32(mvhd.start + 20);
            const hi    = buf.getUint32(mvhd.start + 24);
            const lo    = buf.getUint32(mvhd.start + 28);
            durationVal = hi * 4294967296 + lo;
          } else {
            // 4 bytes creation + 4 bytes modification + 4 bytes timescale + 4 bytes duration
            timescale   = buf.getUint32(mvhd.start + 12);
            durationVal = buf.getUint32(mvhd.start + 16);
          }
          if (!timescale) return resolve(null);
          resolve(Math.floor(durationVal / timescale));
        } catch { resolve(null); }
      };
      reader.onerror = () => resolve(null);
      reader.readAsArrayBuffer(file.slice(0, 1024 * 1024));
    });

    // Helper: baca durasi Opus dari granule position di OGG page terakhir
    const readOpusDuration = (file) => new Promise(resolve => {
      // Baca 64KB terakhir file — OGG end-of-stream page ada di sana
      const TAIL = Math.min(file.size, 65536);
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const buf = new Uint8Array(e.target.result);
          // Cari OggS page terakhir yang punya header_type & 0x04 (EOS) atau granule > 0
          let lastGranule = -1;
          let sampleRate  = 48000; // Opus selalu 48kHz internal
          for (let i = buf.length - 4; i >= 0; i--) {
            if (buf[i]===0x4F&&buf[i+1]===0x67&&buf[i+2]===0x67&&buf[i+3]===0x53) {
              // granule position ada di offset 6 dari OggS, 8 bytes little-endian
              if (i + 14 <= buf.length) {
                const lo = buf[i+6]|(buf[i+7]<<8)|(buf[i+8]<<16)|(buf[i+9]<<24);
                const hi = buf[i+10]|(buf[i+11]<<8)|(buf[i+12]<<16)|(buf[i+13]<<24);
                const granule = hi * 4294967296 + lo;
                if (granule > 0 && granule !== 0xFFFFFFFFFFFF) {
                  lastGranule = granule;
                  break;
                }
              }
            }
          }
          if (lastGranule < 0) return resolve(null);
          resolve(Math.floor(lastGranule / sampleRate));
        } catch { resolve(null); }
      };
      reader.onerror = () => resolve(null);
      reader.readAsArrayBuffer(file.slice(Math.max(0, file.size - TAIL)));
    });

    // Helper: get duration via Audio element (dengan timeout 5 detik)
    // Helper: baca durasi MP3 VBR dari Xing/Info/VBRI header
    // Menggantikan Audio element yang menghitung CBR secara salah untuk VBR MP3.
    // Xing header ada di frame MP3 pertama setelah ID3 tag.
    const readMp3Duration = (file) => new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const buf = new Uint8Array(e.target.result);
          const dv  = new DataView(e.target.result);
          let pos = 0;

          // Lewati ID3v2 tag jika ada
          if (buf[0] === 0x49 && buf[1] === 0x44 && buf[2] === 0x33) {
            const id3Size = ((buf[6] & 0x7F) << 21) | ((buf[7] & 0x7F) << 14) |
                            ((buf[8] & 0x7F) << 7)  | (buf[9] & 0x7F);
            pos = id3Size + 10;
          }

          // Cari frame MP3 pertama (sync word 0xFFEx)
          while (pos < buf.length - 4) {
            if (buf[pos] === 0xFF && (buf[pos+1] & 0xE0) === 0xE0) break;
            pos++;
          }
          if (pos >= buf.length - 4) return resolve(null);

          const h       = dv.getUint32(pos);
          const mpegVer = (h >> 19) & 3;   // 3=MPEG1, 2=MPEG2, 0=MPEG2.5
          const layer   = (h >> 17) & 3;   // 1=LayerIII
          const brIdx   = (h >> 12) & 0xF;
          const srIdx   = (h >> 10) & 3;
          const padding = (h >> 9)  & 1;
          const chMode  = (h >> 6)  & 3;   // 3=Mono

          if (layer !== 1) return resolve(null); // hanya Layer III

          const BR_V1 = [0,32,40,48,56,64,80,96,112,128,160,192,224,256,320,0];
          const SR    = {3:[44100,48000,32000], 2:[22050,24000,16000], 0:[11025,12000,8000]};
          const br    = BR_V1[brIdx]; // kbps
          const sr    = (SR[mpegVer] || SR[3])[srIdx];
          if (!br || !sr) return resolve(null);

          // Ukuran frame Xing (side info: 32 byte stereo, 17 byte mono, MPEG1)
          const sideInfoSize = (mpegVer === 3) ? (chMode === 3 ? 17 : 32) : (chMode === 3 ? 9 : 17);
          const xingOffset   = pos + 4 + sideInfoSize;

          // Cek Xing / Info header
          const tag4 = String.fromCharCode(buf[xingOffset],buf[xingOffset+1],buf[xingOffset+2],buf[xingOffset+3]);
          if (tag4 === "Xing" || tag4 === "Info") {
            const flags  = dv.getUint32(xingOffset + 4);
            if (flags & 1) { // has frame count
              const frames = dv.getUint32(xingOffset + 8);
              // Samples per frame: 1152 untuk MPEG1 Layer III
              const totalSamples = frames * 1152;
              return resolve(Math.floor(totalSamples / sr));
            }
          }

          // Cek VBRI header (Fraunhofer encoder)
          const vbriOffset = pos + 4 + 32; // selalu 32 byte setelah frame header
          const vbriTag = String.fromCharCode(buf[vbriOffset],buf[vbriOffset+1],buf[vbriOffset+2],buf[vbriOffset+3]);
          if (vbriTag === "VBRI") {
            const frames = dv.getUint32(vbriOffset + 14);
            return resolve(Math.floor(frames * 1152 / sr));
          }

          // CBR: hitung dari ukuran file dan bitrate
          const frameSize  = Math.floor(144 * br * 1000 / sr) + padding;
          const audioBytes = file.size - pos;
          const totalFrames = Math.floor(audioBytes / frameSize);
          resolve(Math.floor(totalFrames * 1152 / sr));
        } catch { resolve(null); }
      };
      reader.onerror = () => resolve(null);
      // Hanya butuh ~512 byte — header Xing ada di frame pertama
      reader.readAsArrayBuffer(file.slice(0, Math.min(file.size, 512 * 1024)));
    });

    const readDuration = async (url, file) => {
      // MP3: baca Xing/VBRI header untuk VBR, fallback CBR dari ukuran file
      if (file && /\.(mp3|mpeg)$/i.test(file.name)) {
        const d = await readMp3Duration(file);
        if (d) return d;
      }
      // FLAC: baca langsung dari header biner — paling cepat & andal
      if (file && /\.flac$/i.test(file.name)) {
        const d = await readFlacDuration(file);
        if (d) return d;
      }
      // M4A / MP4: parse atom mvhd secara biner
      if (file && /\.(m4a|mp4|m4b|m4r)$/i.test(file.name)) {
        const d = await readM4aDuration(file);
        if (d) return d;
      }
      // Opus: baca granule position dari OGG tail
      if (file && /\.opus$/i.test(file.name)) {
        const d = await readOpusDuration(file);
        if (d) return d;
      }
      return new Promise(resolve => {
        const tmp = new Audio();
        tmp.preload = 'metadata';
        const timer = setTimeout(() => { tmp.src = ''; resolve(0); }, 7000);
        tmp.addEventListener("loadedmetadata", () => { clearTimeout(timer); tmp.src = ''; resolve(Math.floor(tmp.duration)||0); });
        tmp.addEventListener("error", () => { clearTimeout(timer); resolve(0); });
        tmp.src = url;
        tmp.load();
      });
    };

    // ── Manual binary lyrics extractor ──────────────────────────────────────
    // Tiga strategi berlapis: structured ID3 → raw byte search → M4A atom.
    // Hanya baca 1.5 MB pertama (ID3 tag selalu di awal file).
    const readLyricsManual = (file) => new Promise(resolve => {
      const CHUNK = Math.min(file.size, 1.5 * 1024 * 1024);
      const blob  = file.slice(0, CHUNK);
      const reader = new FileReader();

      reader.onload = (e) => {
        try {
          const buf = e.target.result;
          const u8  = new Uint8Array(buf);
          const dv  = new DataView(buf);

          // ── Helper: decode teks dari bytes dengan berbagai encoding ──────
          const decodeText = (bytes, enc) => {
            const encs = { 0:"windows-1252", 1:"utf-16", 2:"utf-16be", 3:"utf-8" };
            try { return new TextDecoder(encs[enc]||"utf-8").decode(bytes); }
            catch { return Array.from(bytes).map(b=>String.fromCharCode(b)).join(""); }
          };

          // ── Helper: cari byte sequence dalam array ───────────────────────
          const findSeq = (haystack, needle, fromIdx=0) => {
            outer: for (let i = fromIdx; i <= haystack.length - needle.length; i++) {
              for (let j = 0; j < needle.length; j++) {
                if (haystack[i+j] !== needle[j]) continue outer;
              }
              return i;
            }
            return -1;
          };

          // ═══ STRATEGI 0: FLAC Vorbis Comment ════════════════════════════
          // FLAC memakai Vorbis Comment (bukan ID3), tag lirik ada di field
          // "LYRICS" atau "UNSYNCEDLYRICS", format sering Enhanced LRC.
          if (u8[0]===0x66&&u8[1]===0x4C&&u8[2]===0x61&&u8[3]===0x43) { // "fLaC"
            const readU32LE = (off) => u8[off]|(u8[off+1]<<8)|(u8[off+2]<<16)|(u8[off+3]<<24);
            const dec = new TextDecoder("utf-8");
            let pos = 4;
            while (pos + 4 <= buf.byteLength) {
              const b0        = u8[pos];
              const lastBlock = (b0 & 0x80) !== 0;
              const blockType = b0 & 0x7F;
              const blockSize = (u8[pos+1]<<16)|(u8[pos+2]<<8)|u8[pos+3];
              pos += 4;
              if (blockType === 4) { // VORBIS_COMMENT
                let p = pos;
                const vlen = readU32LE(p); p += 4 + vlen;
                const count = readU32LE(p); p += 4;
                const vcTags = {};
                for (let ci = 0; ci < count && p < pos + blockSize; ci++) {
                  const clen = readU32LE(p); p += 4;
                  if (clen <= 0 || p + clen > buf.byteLength) break;
                  const comment = dec.decode(u8.slice(p, p + clen)); p += clen;
                  const eq = comment.indexOf("=");
                  if (eq > 0) {
                    const key = comment.slice(0, eq).toUpperCase();
                    const val = comment.slice(eq + 1);
                    vcTags[key] = val;
                  }
                }
                // Pilih tag lirik: urutan preferensi
                const lyricsText = vcTags["LYRICS"] || vcTags["UNSYNCEDLYRICS"] || vcTags["SYNCEDLYRICS"] || null;
                if (lyricsText && lyricsText.trim()) {
                  resolve({ text: lyricsText, strategy: "flac-vorbis" }); return;
                }
              }
              pos += blockSize;
              if (lastBlock) break;
            }
          }

          // ═══ STRATEGI 1: Structured ID3v2 frame parsing ═════════════════
          if (u8[0]===0x49 && u8[1]===0x44 && u8[2]===0x33) {
            const ver   = u8[3];
            const flags = u8[5];
            const tagSize = (u8[6]<<21)|(u8[7]<<14)|(u8[8]<<7)|u8[9];
            const tagEnd  = Math.min(10 + tagSize, buf.byteLength);
            let pos = 10;

            if ((flags & 0x40) && ver >= 3) {
              const extSz = ver===4
                ? (u8[pos]<<21)|(u8[pos+1]<<14)|(u8[pos+2]<<7)|u8[pos+3]
                : dv.getUint32(pos);
              pos += extSz;
            }

            while (pos + (ver===2?6:10) <= tagEnd) {
              let frameId, frameSize, hdrLen;
              if (ver === 2) {
                frameId  = String.fromCharCode(u8[pos],u8[pos+1],u8[pos+2]);
                frameSize= (u8[pos+3]<<16)|(u8[pos+4]<<8)|u8[pos+5];
                hdrLen   = 6;
              } else {
                frameId  = String.fromCharCode(u8[pos],u8[pos+1],u8[pos+2],u8[pos+3]);
                if (!frameId.trim() || u8[pos]===0) break;
                frameSize= ver===4
                  ? (u8[pos+4]<<21)|(u8[pos+5]<<14)|(u8[pos+6]<<7)|u8[pos+7]
                  : ((u8[pos+4]<<24)|(u8[pos+5]<<16)|(u8[pos+6]<<8)|u8[pos+7])>>>0;
                hdrLen   = 10;
              }
              if (frameSize<=0 || frameSize>tagEnd) break;

              const targets = ver===2 ? ["ULT"] : ["USLT"];
              if (targets.includes(frameId) && frameSize > 4) {
                const frameStart = pos + hdrLen;
                const enc      = u8[frameStart];
                let   i        = frameStart + 4;
                const safeEnd  = frameStart + frameSize;
                const isWide   = enc===1||enc===2;

                if (isWide) {
                  while (i+1 < safeEnd && !(u8[i]===0 && u8[i+1]===0)) i+=2;
                  i += 2;
                } else {
                  while (i < safeEnd && u8[i]!==0) i++;
                  i++;
                }

                if (i < safeEnd) {
                  const text = decodeText(u8.slice(i, safeEnd), enc).replace(/\0/g,"").trim();
                  if (text) { resolve({ text, strategy:"structured" }); return; }
                }
              }
              pos += hdrLen + frameSize;
            }
          }

          // ═══ STRATEGI 2: Raw byte search — cari "USLT" / "ULT\x00" ══════
          const searchTargets = [
            [0x55,0x53,0x4C,0x54],
            [0x55,0x4C,0x54],
          ];
          for (const needle of searchTargets) {
            let searchFrom = 0;
            while (true) {
              const found = findSeq(u8, needle, searchFrom);
              if (found < 0 || found > buf.byteLength - 20) break;

              const afterHeader = found + (needle.length === 3 ? 6 : 10);
              if (afterHeader >= buf.byteLength) { searchFrom = found + 1; continue; }

              const enc = u8[afterHeader] <= 3 ? u8[afterHeader] : 0;
              const isWide = enc===1||enc===2;
              const safeEnd = Math.min(afterHeader + 65536, buf.byteLength);
              let i = afterHeader + 4;

              if (isWide) {
                while (i+1 < safeEnd && !(u8[i]===0 && u8[i+1]===0)) i+=2;
                i += 2;
              } else {
                while (i < safeEnd && u8[i]!==0) i++;
                i++;
              }

              if (i < safeEnd) {
                const raw  = u8.slice(i, Math.min(i+65000, safeEnd));
                const text = decodeText(raw, enc).replace(/\0/g,"").trim();
                const letters = (text.match(/[\p{L}\s]/gu)||[]).length;
                if (text.length > 5 && letters/text.length > 0.6) {
                  resolve({ text, strategy:"rawsearch" }); return;
                }
              }
              searchFrom = found + 1;
            }
          }

          // ═══ STRATEGI 3: M4A/MP4 ©lyr atom ══════════════════════════════
          const findAtom = (data, start, end, name) => {
            let p = start;
            const nc = name.split("").map(c=>c.charCodeAt(0));
            while (p + 8 <= end) {
              const sz = ((data[p]<<24)|(data[p+1]<<16)|(data[p+2]<<8)|data[p+3])>>>0;
              if (sz < 8 || sz > end - p + 4) break;
              const match = nc.every((c,j) => data[p+4+j]===c);
              if (match) return { start:p, size:sz };
              p += sz;
            }
            return null;
          };
          const moov = findAtom(u8, 0, buf.byteLength, "moov");
          if (moov) {
            const udta = findAtom(u8, moov.start+8, moov.start+moov.size, "udta");
            const meta = udta && findAtom(u8, udta.start+8, udta.start+udta.size, "meta");
            const ilst = meta && findAtom(u8, meta.start+12, meta.start+meta.size, "ilst");
            if (ilst) {
              const lyrSeq = [0xa9,0x6c,0x79,0x72];
              const lyrPos = findSeq(u8, lyrSeq, ilst.start+8);
              if (lyrPos>0 && lyrPos < ilst.start+ilst.size) {
                const dataPos = lyrPos + 4;
                const dataAtom = findAtom(u8, dataPos, lyrPos + Math.min(65536, ilst.start+ilst.size-lyrPos), "data");
                if (dataAtom) {
                  const textBytes = u8.slice(dataAtom.start+16, dataAtom.start+dataAtom.size);
                  const text = new TextDecoder("utf-8").decode(textBytes).replace(/\0/g,"").trim();
                  if (text) { resolve({ text, strategy:"m4a" }); return; }
                }
              }
            }
          }

          resolve(null);
        } catch(err) { resolve(null); }
      };
      reader.onerror = () => resolve(null);
      reader.readAsArrayBuffer(blob);
    });

    // ── Proses satu file → objek lagu ──────────────────────────────────────
    const processOne = async (file, i) => {
      // Folder: dari _folder (showDirectoryPicker), webkitRelativePath (webkitdirectory), atau _folderName
      const _wkParts = file.webkitRelativePath ? file.webkitRelativePath.split("/") : null;
      const _folder = file._folder
        ? file._folder
        : _folderName
          ? _folderName
          : _wkParts
            ? (_wkParts.length >= 3 ? _wkParts[1] : _wkParts[0])
            : null;

      // Pastikan blob URL memiliki MIME type yang benar
      const mimeType = file.type || getMime(file.name);
      // Audio URL selalu pakai file asli (perlu seluruh isi file)
      const url  = URL.createObjectURL(file);
      const name = file.name.replace(/\.[^/.]+$/, "");
      const id   = Date.now() + i;

      // ── Pre-read sekali: baca 2MB head ke memory ──────────────────────────
      // Semua parser metadata (sanitizeFlac, readFlacTags, readFlacDuration,
      // readM4aDuration, readOpusTags, readLyricsManual) hanya butuh ≤1.5MB
      // dari awal file. Dengan pre-read satu kali, kita ganti 4–5 FileReader
      // disk I/O per file menjadi 1. Krusial untuk File System Access API
      // (folder import) di mana setiap FileReader round-trip ke OS memakan
      // waktu, sedangkan file dari <input> mungkin di-cache browser.
      const HEAD = 2 * 1024 * 1024;
      let fileHead = file; // fallback jika pre-read gagal
      try {
        const headBuf = await file.slice(0, Math.min(file.size, HEAD)).arrayBuffer();
        fileHead = new File([headBuf], file.name, { type: mimeType, lastModified: file.lastModified || Date.now() });
      } catch { /* pakai file asli */ }

      // Sanitasi FLAC corrupt — gunakan head (sudah in-memory, zero disk I/O)
      fileHead = await sanitizeFlac(fileHead);

      const [tags, duration] = await Promise.all([readTags(fileHead), readDuration(url, fileHead)]);
        const title  = tags.title  || name;
        const artist = tags.artist || T("meta_unknown_artist");
        const album  = tags.album  || T("meta_import_album");
        const year   = parseInt(String(tags.year || "").slice(0, 4)) || new Date().getFullYear();
        const track  = tags.track  || null;
        const genre  = tags.genre  || null;
        const comment= (tags.comment && (tags.comment.text || tags.comment)) || null;

        // Cover art from ID3
        let coverUrl  = null;
        // Fallback color: OKLCH tonal palette dengan hue deterministik dari title+artist
        const _seed = (title+artist).split("").reduce((a,c)=>a+c.charCodeAt(0),0);
        const _H    = (_seed * 137.508) % 360; // golden angle — distribusi hue merata
        const _C    = 0.13; // chroma cukup vibrant tapi tidak mencolok
        let colorSet = {
          color:        rgb2hex(oklchTone(0.60, _C, _H)),
          colorDark:    rgb2hex(oklchTone(0.35, _C, _H)),
          colorLight:   rgb2hex(oklchTone(0.88, _C * 0.7, _H)),
          isMonochrome: false,
        };
        const pic = tags.picture;
        if (pic && (pic.data || pic._b64)) {
          const b64   = pic._b64 || (() => {
            const bytes = new Uint8Array(pic.data);
            let binary  = "";
            bytes.forEach(b => binary += String.fromCharCode(b));
            return btoa(binary);
          })();
          const mime  = pic.format || "image/jpeg";
          coverUrl    = `data:${mime};base64,${b64}`;
          const derived = await getCoverColor(b64, mime);
          if (derived) colorSet = derived;
        }

        // ── Ambil teks lirik mentah dari jsmediatags ATAU parser manual ──
        let rawLyricsText = null;
        let lyricsSource  = "none";
        // FLAC: lirik sudah ada di tags._rawLyrics dari Vorbis Comment
        if (tags._rawLyrics && tags._rawLyrics.trim()) {
          rawLyricsText = tags._rawLyrics;
          lyricsSource  = "flac-vorbis";
        }
        try {
          const sylt = tags.SYLT || tags.sylt;
          const uslt = tags.USLT || tags.uslt;

          if (sylt && sylt.data) {
            const entries = Array.isArray(sylt.data) ? sylt.data : [];
            const lyrics = entries.map(([text, ms]) => ({
              t: Math.round(ms/100)/10, w: text ? text.trim() : "",
            })).filter(l => l.w);
            return {
              id, title, artist, album, year, duration,
              favorite: false, lyrics, lyricsSource: "sylt", url,
              coverUrl, track, genre, comment,
              fileSize: file.size, fileName: file.name, fileType: file.type||"audio/*",
              folder: _folder || undefined,
              ...colorSet,
            };
          } else if (uslt) {
            rawLyricsText = typeof uslt === "string" ? uslt
              : uslt.lyrics || uslt.text || uslt.data || uslt.value || "";
            if (rawLyricsText.trim()) lyricsSource = "jsmediatags";
          }
        } catch { /* lanjut ke fallback */ }

        if (!rawLyricsText || !rawLyricsText.trim()) {
          const manual = await readLyricsManual(fileHead);
          if (manual && manual.text && manual.text.trim()) {
            rawLyricsText = manual.text;
            lyricsSource  = "manual";
          }
        }

        let lyrics = [];
        if (rawLyricsText && rawLyricsText.trim()) {
          const rawLines = rawLyricsText.split(/\r?\n/);
          const lines    = rawLines.filter(l => l.trim());
          const lrcRe    = /^\[(\d{1,2}):(\d{2})[\.:,](\d{2,3})\]\s*(.*)$/;
          const enhancedLrcRe = /<\d{1,2}:\d{2}\.\d{2,3}>/;
          const isEnhancedLrc = lines.some(l => enhancedLrcRe.test(l));
          const isLrc         = !isEnhancedLrc && lines.some(l => lrcRe.test(l.trim()));

          if (isEnhancedLrc) {
            lyrics = parseEnhancedLrc(rawLyricsText);
            lyricsSource = "enhanced-lrc";
          } else if (isLrc) {
            lyrics = parseLrc(rawLyricsText);
            lyricsSource = "lrc";
          } else {
            lyrics = rawLines.map(line => ({ t: null, w: line.trim(), isLine: true }));
            lyricsSource = lyricsSource === "none" ? "plain" : lyricsSource + "_plain";
          }
        }

        return {
          id, title, artist, album, year, duration,
          favorite: false, lyrics, lyricsSource, url,
          coverUrl, track, genre, comment,
          fileSize: file.size, fileName: file.name,
          fileType: file.type || "audio/*",
          dateAdded: file.lastModified || id,
          folder: _folder || undefined,
          ...colorSet,
        };
    };

    // ── Concurrency pool — proses 10 file sekaligus ─────────────────────────
    // Dinaikkan 6→10: setelah pre-read head, operasi mayoritas in-memory.
    const CONCURRENCY = 10;
    const results = new Array(files.length);
    let nextIdx = 0, completed = 0;

    const imported = await new Promise(resolve => {
      const tryNext = () => {
        while (nextIdx < files.length && nextIdx - completed < CONCURRENCY) {
          const i = nextIdx++;
          const file = files[i];
          processOne(file, i)
            .then(song  => { results[i] = song; })
            .catch((err) => { console.warn("[Flora] processOne failed:", err); results[i] = null; })
            .finally(() => {
              completed++;
              onProgress?.(completed, files.length, file.name);
              if (completed === files.length) resolve(results.filter(Boolean));
              else tryNext();
            });
        }
      };
      tryNext();
    });

    setSongs(s => {
        // Deteksi duplikat berdasarkan fileName
        const existingNames = new Set(s.map(x => x.fileName));
        const dupes = imported.filter(x => existingNames.has(x.fileName));
        const fresh = imported.filter(x => !existingNames.has(x.fileName));

    });
  }, [playSong, showToast]);

  const openFolderImport = useCallback(async () => {
    // showDirectoryPicker membutuhkan secure context (HTTPS / localhost).
    // Di Android Chrome yang dimuat dari content:// atau file://, API ini terdefinisi
    // tapi langsung melempar SecurityError — tertangkap diam-diam oleh catch { return }.
    // Solusi: pakai isSecureContext untuk deteksi dini, dan pada catch yang bukan
    // AbortError (user batal), jatuhkan ke fallback <input webkitdirectory>.

    const runInputFallback = () => {
      const input = document.createElement('input');
      input.type = 'file';
      // Jangan set accept="audio/*" pada mode webkitdirectory — Android Chrome
      // sering tidak memetakan .flac/.ogg ke audio/* sehingga file ikut terfilter.
      // Filter berdasarkan ekstensi dilakukan secara manual di bawah.
      input.setAttribute('webkitdirectory', '');
      input.setAttribute('multiple', '');
      input.onchange = async () => {
        const files = Array.from(input.files || []).filter(f => {
          const ext = f.name.split('.').pop().toLowerCase();
          return ['mp3','flac','ogg','wav','m4a','aac','opus','weba','webm','mp4'].includes(ext);
        });
        if (!files.length) return;
        // Deteksi nama folder dari common prefix webkitRelativePath
        const paths = files.map(f => (f.webkitRelativePath || f.name).split('/'));
        const prefixDepth = (() => {
          const minLen = Math.min(...paths.map(p => p.length)) - 1;
          let d = 0;
          while (d < minLen && paths.every(p => p[d] === paths[0][d])) d++;
          return d;
        })();
        const rootName = prefixDepth > 0 ? paths[0][prefixDepth - 1] : (paths[0][0] || 'Folder');
        const folderName = rootName;
        cancelScanRef.current = false;
        setScanState({ folderName, found: files.length, done: 0, scanDone: true, currentFile: '' });
        await processFiles(files, {
          folderName,
          onProgress: (done, total, fileName) => {
            if (cancelScanRef.current) return;
            setScanState(s => s ? { ...s, done, currentFile: fileName } : s);
          }
        });
        setScanState(null);
      };
      input.click();
    };

    // Gunakan fallback langsung jika showDirectoryPicker tidak ada atau konteks tidak aman
    if (!window.showDirectoryPicker || !window.isSecureContext) {
      runInputFallback();
      return;
    }

    let dirHandle;
    try { dirHandle = await window.showDirectoryPicker({ mode: "read" }); }
    catch (err) {
      // AbortError = user membatalkan → diam saja
      if (err?.name === 'AbortError') return;
      // SecurityError / NotSupportedError / lainnya → coba fallback
      runInputFallback();
      return;
    }

    const folderName = dirHandle.name;
    const AUDIO_EXTS = new Set(["mp3","flac","ogg","wav","m4a","aac","opus","weba","webm","mp4"]);
    cancelScanRef.current = false;

    setScanState({ folderName, found:0, done:0, scanDone:false, currentFile:"" });

    // ── Kumpulkan semua File dari folder secara rekursif ─────────────────────
    const collectedFiles = [];
    let found = 0;

    let updPending = false;
    const updFound = () => {
      if (updPending) return;
      updPending = true;
      setTimeout(() => { updPending = false; setScanState(s => s ? { ...s, found } : s); }, 120);
    };

    // ── Fase 1: traversal rekursif — kumpulkan semua {entry, folder} tanpa getFile() ──
    // Seluruh tree di-traverse dulu secara paralel antar subfolder,
    // lalu semua getFile() di-batch sekaligus di fase 2.
    const pendingEntries = []; // [{entry, folder}]
    const traverse = async (handle, subFolder) => {
      if (cancelScanRef.current) return;
      let entries = [];
      try { for await (const e of handle.values()) entries.push(e); }
      catch { return; }
      await Promise.all(entries.map(async e => {
        if (cancelScanRef.current) return;
        try {
          if (e.kind === "file") {
            const ext = e.name.split(".").pop().toLowerCase();
            if (AUDIO_EXTS.has(ext)) pendingEntries.push({ entry: e, folder: subFolder || folderName });
          } else if (e.kind === "directory") {
            await traverse(e, subFolder || e.name);
          }
        } catch { /* skip */ }
      }));
    };

    try { await traverse(dirHandle, null); } catch { /* lanjut dengan yang terkumpul */ }

    if (cancelScanRef.current) { setScanState(null); return; }

    // ── Fase 2: getFile() semua sekaligus — satu Promise.all besar ──
    // Tidak ada await sequential; browser/OS dapat paralel penuh semua file.
    found = pendingEntries.length;
    updFound();
    await Promise.all(pendingEntries.map(async ({ entry, folder }) => {
      if (cancelScanRef.current) return;
      try {
        const file = await entry.getFile();
        Object.defineProperty(file, '_folder', { value: folder, writable: false });
        collectedFiles.push(file);
      } catch { /* skip file yang gagal */ }
    }));

    if (cancelScanRef.current) { setScanState(null); return; }
    if (collectedFiles.length === 0) {
      setScanState(null);
      showToast(T("toast_no_audio"), "warning");
      return;
    }

    setScanState(s => s ? { ...s, found: collectedFiles.length, done: 0, scanDone: true, currentFile: "" } : s);

    // ── Delegasikan ke processFiles — pipeline lengkap (lirik, cover, OKLCH, dll.) ──
    importedHandles.current.set(folderName, dirHandle);
    await processFiles(collectedFiles, {
      folderName,
      onProgress: (done, total, fileName) => {
        if (cancelScanRef.current) return;
        setScanState(s => s ? { ...s, done, currentFile: fileName } : s);
      }
    });
    setScanState(null);
  }, [playSong, showToast]);

    if (handles.length === 0) return { newCount: 0, noHandles: true };

    const AUDIO_EXTS = new Set(["mp3","flac","ogg","wav","m4a","aac","opus","weba","webm","mp4"]);
    let totalNew = 0;

    for (const [folderName, dirHandle] of handles) {
      // ── Fase 1: traverse rekursif paralel — kumpulkan semua entry tanpa getFile() ──
      const pendingEntries = []; // [{entry, name}]
      const traverse = async (handle) => {
        let entries = [];
        try { for await (const e of handle.values()) entries.push(e); }
        catch { return; }
        await Promise.all(entries.map(async e => {
          try {
            if (e.kind === "file") {
              const ext = e.name.split(".").pop().toLowerCase();
              if (AUDIO_EXTS.has(ext)) pendingEntries.push({ entry: e, name: e.name });
            } else if (e.kind === "directory") {
              await traverse(e);
            }
          } catch { /* skip */ }
        }));
      };
      try { await traverse(dirHandle); } catch { continue; }

      // ── Filter: hanya file yang belum ada di library ──
      const existingNames = new Set(songs.filter(s => s.folder === folderName).map(s => s.fileName));
      const newEntries = pendingEntries.filter(({ name }) => !existingNames.has(name));
      if (newEntries.length === 0) continue;

      // ── Fase 2: getFile() semua file baru sekaligus — paralel penuh ──
      const newFiles = (await Promise.all(
        newEntries.map(async ({ entry }) => {
          try {
            const file = await entry.getFile();
            Object.defineProperty(file, '_folder', { value: folderName, writable: false });
            return file;
          } catch { return null; }
        })
      )).filter(Boolean);

      if (newFiles.length === 0) continue;
      await processFiles(newFiles, { folderName, onProgress });
      totalNew += newFiles.length;
    }
    return { newCount: totalNew, noHandles: false };
  }, [songs, processFiles]);

    let artworkBlobUrl = null;
    const buildMetadata = (artworkUrl) => {
      const artwork = artworkUrl ? [{ src: artworkUrl, sizes: '512x512', type: 'image/jpeg' }] : [];
      navigator.mediaSession.metadata = new MediaMetadata({
        title:  curSong.title  || T('meta_unknown'),
        artist: curSong.artist || T('meta_unknown_artist'),
        album:  curSong.album  || '',
        artwork,
      });
    };

    if (curSong.coverUrl) {
      // Canvas approach: gambar ke canvas 256×256 → toBlob() → Blob URL
      // Lebih ringan & kompatibel di Android Chrome daripada fetch(base64)
      const img = new Image();
      img.onload = () => {
        try {
          const canvas = document.createElement('canvas');
          canvas.width = canvas.height = 256;
          canvas.getContext('2d').drawImage(img, 0, 0, 256, 256);
          canvas.toBlob(blob => {
            if (!blob) { buildMetadata(null); return; }
            if (artworkBlobUrl) URL.revokeObjectURL(artworkBlobUrl);
            artworkBlobUrl = URL.createObjectURL(blob);
            buildMetadata(artworkBlobUrl);
          }, 'image/jpeg', 0.85);
        } catch { buildMetadata(null); }
      };
      img.onerror = () => buildMetadata(null);
      img.src = curSong.coverUrl;
    } else {
      buildMetadata(null);

      const now = performance.now();

      // ── Fade-out A: turunkan volume saat cf detik tersisa ──────────────

      }
