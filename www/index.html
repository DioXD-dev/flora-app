  const folders = useMemo(() => mkFolders(visibleSongs, FOLDERS), [visibleSongs]);

  const visibleNav = activeNav.map(id=>NAV_OPTS.find(o=>o.id===id)).filter(Boolean);

  const isOnSettings = page === "settings" || ["tema","navbar","audio","about"].includes(subPage);

  const miniBg = dark ? dc+"28" : dl;
  const miniTitleColor = dark ? "#fff" : dd;
  const miniArtistColor = dark ? dc : dc;
  const miniBtnColor = dark ? dc : dd;

  const [greetingKey,    setGreetingKey]    = useState(() => getGreetingKey());
  const [recentlyIdx,    setRecentlyIdx]    = useState(0);
  const [mostplayedIdx,  setMostplayedIdx]  = useState(0);
  // Derived — always in sync with lang, zero flash
  const greeting          = T(greetingKey);
  const recentlyGreeting  = T(["g_recently_0","g_recently_1","g_recently_2"][recentlyIdx]);
  const mostplayedGreeting = T(["g_mostplayed_0","g_mostplayed_1","g_mostplayed_2"][mostplayedIdx]);
  const lastGreetingUpdate = useRef(Date.now());
  const refreshGreeting = useCallback(() => {
    const now = Date.now();
    if (now - lastGreetingUpdate.current >= 30000) {
      setGreetingKey(getGreetingKey());
      setRecentlyIdx(Math.floor(Math.random()*3));
      setMostplayedIdx(Math.floor(Math.random()*3));
      lastGreetingUpdate.current = now;
    }
  }, []);

  // ── Logo spin+jolt saat lagu berganti ────────────────────────────────────
  const [logoAnimKey, setLogoAnimKey] = useState(0);
  const logoAnimTimer = useRef(null);
  const prevSongIdRef = useRef(null);
  useEffect(() => {
    if (!curSong?.id) return;
    if (curSong.id === prevSongIdRef.current) return;
    prevSongIdRef.current = curSong.id;

    // Reset seekbar & progress instan saat curSong berubah — apapun penyebabnya
    progressRef.current = 0;
    setProgress(0);
    if (miniProgressBarRef.current) miniProgressBarRef.current.style.width = '0%';
    if (bubbleRingRef.current) {
      const circ = 2 * Math.PI * 25;
      bubbleRingRef.current.setAttribute('stroke-dashoffset', String(circ));
    }

    // Trigger animasi logo
    clearTimeout(logoAnimTimer.current);
    setLogoAnimKey(k => k + 1);
    logoAnimTimer.current = setTimeout(() => setLogoAnimKey(0), 550);
  }, [curSong?.id]);

  // Acak greeting saat berpindah ke halaman tersebut
  const greetingPageRef = useRef(page);
  useEffect(() => {
    if (page !== greetingPageRef.current) {
      if (page === "recently")   setRecentlyIdx(Math.floor(Math.random()*3));
      if (page === "mostplayed") setMostplayedIdx(Math.floor(Math.random()*3));
      greetingPageRef.current = page;
    }
  }, [page]);

  // Teks untuk tombol sortir
  const getSortButtonLabel = () => {
    if (sortBy === 'title') {
      return `A-Z ${sortOrder === 'asc' ? '▲' : '▼'}`;
    } else if (sortBy === 'added') {
      return `${sortOrder === 'asc' ? T('sort_newest') : T('sort_oldest')} ${sortOrder === 'asc' ? '▲' : '▼'}`;
    } else if (sortBy === 'year') {
      return `${T('sort_year_prefix')} ${sortOrder === 'asc' ? T('sort_newest') : T('sort_oldest')} ${sortOrder === 'asc' ? '▲' : '▼'}`;
    }
    return T('ss_title');
  };

  return (
    <div style={{ fontFamily:"'Nunito','Segoe UI',sans-serif", background:appBg,
      width:"100%", height:"100%", display:"flex", flexDirection:"column",
      overflow:"hidden", position:"relative",
      paddingTop:"env(safe-area-inset-top)",
      paddingBottom: page === "nowplaying" ? 0 : "env(safe-area-inset-bottom)" }}>

      {/* Shared SVG defs untuk CoverArtCD — hanya satu instance di DOM */}
      <CoverArtCDDefs/>

      {/* Ambient geometric shape — top-right header decoration */}
      {page !== "nowplaying" && (
        <div style={{position:"absolute",top:0,right:0,height:240,overflow:"hidden",pointerEvents:"none",zIndex:0}}>
          {page !== "settings" && !["tema","navbar","audio","about"].includes(subPage) && <AmbientGeo dc={dc} shapeIdx={ambientGeoIdx} dark={dark} isPlaying={playing} amoled={amoled} amoledShadows={amoledShadows}/>}
        </div>
      )}
      {/* Accent gradient blob — top-left corner (mirrors NowPlaying style) */}
      {page !== "nowplaying" && page !== "settings" && !["tema","navbar","audio","about"].includes(subPage) && (
        <div style={{
          position:"absolute", top:-60, left:-60, width:260, height:260,
          borderRadius:"50%", pointerEvents:"none", zIndex:0,
          background:`radial-gradient(circle at 30% 30%, ${dc}55 0%, ${dc}00 70%)`,
          filter:"blur(18px)",
        }}/>
      )}

      {/* Top Bar */}
      {page!=="nowplaying" && (
        <div style={{display:"flex",flexDirection:"column", padding:"16px 22px 10px", flexShrink:0, position:"relative", zIndex:1}}>
          {/* Selection mode — menggantikan isi header secara in-place */}
          {selMode && (page==="library" || page==="favorites" || subPage?.startsWith("folder:")) ? (
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",animation:"fadeIn 0.18s ease"}}>
              <span style={{fontSize:15,fontWeight:800,color:dc}}>{selected.size} dipilih</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={()=>{
                  const ctxSongs = page==="favorites"
                    ? visibleSongs.filter(s=>s.favorite)
                    : subPage?.startsWith("folder:")
                      ? visibleSongs.filter(s=>s.folder===subPage.slice(7))
                      : visibleSongs;
                  setSelected(new Set(ctxSongs.map(s=>s.id)));
                }} style={{
                  background:dl,border:"none",borderRadius:40,padding:"8px 14px",
                  fontFamily:"inherit",fontWeight:800,fontSize:13,color:dd,cursor:"pointer"}}>
                  Pilih Semua
                </button>
                <button onClick={()=>setShowSheet(true)} disabled={selected.size===0} style={{
                  background:selected.size>0?dc:"#ccc",border:"none",borderRadius:40,padding:"8px 14px",
                  fontFamily:"inherit",fontWeight:800,fontSize:13,color:"white",cursor:"pointer"}}>
                  Aksi
                </button>
                <button onClick={()=>{setSelMode(false);setSelected(new Set());}} style={{
                  background:"none",border:"none",padding:4,cursor:"pointer",display:"flex"}}>
                  <Ic n="back" size={20} col={dark?"#aaa":"#888"}/>
                </button>
              </div>
            </div>
          ) : (
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between", width:"100%"}}>
            {(page === "settings" || ["tema","navbar","audio","about"].includes(subPage) || subPage?.startsWith("folder:")) ? (
              <button onClick={() => {
                if (subPage?.startsWith("folder:")) {
                  // Dari sub-folder → kembali ke daftar folder
                  setSubPage(null);
                } else if (subPage) {
                  // Dari sub-menu setelan → kembali ke menu setelan
                  setSubPage(null);
                  setPage("settings");
                } else {
                  // Dari menu setelan → kembali ke menu utama sebelumnya
                  const dest = prevPage === "settings" ? "library" : prevPage;
                  if (dest === "nowplaying") setBoltKey(k=>k+1);
                  goTo(dest);
                }
              }} style={{
                background:"transparent",
                border:"none",
                borderRadius:30,
                width:44, height:44,
                display:"flex", alignItems:"center", justifyContent:"center",
                boxShadow: `0 0 10px 2px ${dc}88`,
              }}>
                <Ic n="back" size={22} col={dc}/>
              </button>
            ) : (
              <button onClick={()=>goTo("nowplaying")} style={{background:"none",border:"none",
                cursor:"pointer",padding:0,display:"inline-flex",alignItems:"center",gap:8}}>
                <svg key={logoAnimKey} width="36" height="36" viewBox="0 0 100 100"
                  className={logoAnimKey ? "logo-song-change" : ""}
                  style={{
                    overflow:"visible", flexShrink:0,
                    filter: (amoled && !amoledShadows) ? "none"
                      : amoled ? `drop-shadow(0 0 12px ${dc}ee) drop-shadow(0 0 4px ${dc}bb) drop-shadow(0 0 20px ${dc}66)`
                      : dark   ? `drop-shadow(0 0 7px ${dc}bb) drop-shadow(0 0 2px ${dc}88)`
                      :          `drop-shadow(0 0 6px ${dc}99) drop-shadow(0 1px 2px rgba(0,0,0,0.18))`,
                  }}>
                  {[315,270,225,180,135,90,45,0].map(deg => (
                    <g key={deg} transform={`translate(50,50) rotate(${deg})`}>
                      <ellipse cx="0" cy="-32" rx="16" ry="26"
                        fill="white"
                        stroke={dc} strokeWidth="2.5"/>
                    </g>
                  ))}
                  <circle cx="50" cy="50" r="11" fill={dc}/>
                </svg>
                <div style={{
                  width:1.5,
                  height:18,
                  borderRadius:2,
                  background:`linear-gradient(180deg,transparent,${dc}99,transparent)`,
                  alignSelf:"center",
                  flexShrink:0,
                }}/>
                <span key={page === "favorites" ? "fav" : page === "recently" ? "recently" : page === "mostplayed" ? "mostplayed" : "default"} className="greeting-bounce" style={{
                  fontSize:14,
                  fontWeight:700,
                  color:dark?"#aaa":"#999",
                  lineHeight:1,
                  letterSpacing:0,
                  fontFamily:"'Lora', serif", fontStyle:"italic",
                  display:"inline-block",
                }}>{page === "favorites" ? T("greeting_fav") : page === "recently" ? recentlyGreeting : page === "mostplayed" ? mostplayedGreeting : greeting}</span>
              </button>
            )}

            {/* Judul folder saat di dalam sub-folder */}
            {subPage?.startsWith("folder:") && (
              <div style={{
                position:"absolute", left:0, right:0,
                display:"flex", justifyContent:"center", alignItems:"center",
                pointerEvents:"none",
              }}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <Ic n="folder" size={14} col={dc}/>
                  <span style={{
                    fontWeight:800, fontSize:15,
                    color:dark?"#eee":"#1a1a1a",
                    letterSpacing:-0.3,
                  }}>{subPage.slice(7)}</span>
                </div>
              </div>
            )}

            {searchOnTop && !isOnSettings ? (
              /* Search pill — menggantikan tombol settings saat searchOnTop aktif */
              <button onClick={()=>{ setShowSearch(true); setSearchQuery(""); }} style={{
                background: showSearch ? dc : cardBg,
                border: `1.5px solid ${dc}55`,
                borderRadius: 40,
                padding: "0 16px",
                height: 44,
                display:"flex", alignItems:"center", gap:8,
                boxShadow: showSearch ? `0 0 10px 2px ${dc}88` : "0 2px 12px rgba(0,0,0,0.10)",
                transition:"background 0.2s, box-shadow 0.2s",
                cursor:"pointer",
              }}>
                <Ic n="search" size={18} col={showSearch?"white":dc}/>
                <span style={{fontSize:13,fontWeight:700,color:showSearch?"white":dc+"cc"}}>Cari</span>
              </button>
            ) : (
              <button onClick={onSettingsBtn} style={{
                background: isOnSettings ? dc : cardBg,
                border:"none", borderRadius:14, width:44, height:44,
                display:"flex", alignItems:"center", justifyContent:"center",
                boxShadow: isOnSettings ? `0 0 10px 2px ${dc}88` : "0 2px 12px rgba(0,0,0,0.10)",
                transition:"background 0.3s, box-shadow 0.3s",
              }}>
                <span key={boltKey} className={boltKey>0?"bolt-spin":""}
                  style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <Ic n="settings" size={22} col={isOnSettings?"white":(dark||amoled)?"#aaa":"#666"}/>
                </span>
              </button>
            )}
          </div>
          )} {/* end selMode else */}

          {/* Tombol Sort dengan label dinamis — tersembunyi saat selMode */}
          {!selMode && page !== "settings" && !["recently","mostplayed"].includes(page) && !["tema","navbar","audio","about"].includes(subPage) && (
            <div style={{display:"flex", alignItems:"center", gap:8, marginTop:12}}>
              <button onClick={() => setShowSortSheet(true)} style={{
                background: dark ? "rgba(255,255,255,0.08)" : "rgba(255,255,255,0.65)",
                backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)",
                border: `1.5px solid ${dc}44`,
                borderRadius: 40,
                padding: "8px 16px",
                display: "flex",
                alignItems: "center",
                gap: 8,
                alignSelf: "flex-start",
                boxShadow: `0 2px 12px ${dc}22`,
              }}>
                <Ic n="sort" size={18} col={dc}/>
                <span style={{ fontSize:13, fontWeight:700, color: dc }}>{getSortButtonLabel()}</span>
              </button>

              {page === "folders" && (
                <button onClick={openFolderImport} style={{
                  background: `${dc}22`,
                  border: `1.5px solid ${dc}`,
                  borderRadius: 40,
                  padding: "8px 16px",
                  display: "flex",
                  alignItems: "center",
                  gap: 8,
                }}>
                  <Ic n="folder" size={18} col={dc}/>
                  <span style={{ fontSize:13, fontWeight:700, color: dc+"cc" }}>Impor Folder</span>
                </button>
              )}
            </div>
          )}
        </div>
      )}
      {/* Page content */}
      <div style={{flex:1,overflow:"hidden",position:"relative"}}>
        {page==="library"   && !subPage && (
          <LibraryPage songs={visibleSongs} currentSong={curSong} isPlaying={playing}
            onPlay={playSongInContext} onFav={toggleFav} dc={dc} dd={dd} dl={dl} dark={dark||amoled} onShowToast={showToast} lang={lang}
            playlists={playlists} setPlaylists={setPlaylists} queue={queue} setQueue={setQueue} setSongs={setSongs}
            selectionMode={selMode} setSelectionMode={setSelMode}
            selected={selected} setSelected={setSelected}
            showSheet={showSheet} setShowSheet={setShowSheet}
            sortBy={sortBy} sortOrder={sortOrder} setBlacklist={setBlacklist}
            scrollKey="library" scrollPositions={scrollPositions}/>
        )}
        {page==="favorites" && !subPage && (
          <LibraryPage songs={visibleSongs.filter(s=>s.favorite)} currentSong={curSong}
            isPlaying={playing} onPlay={playSongInContext} onFav={toggleFav}
            dc={dc} dd={dd} dl={dl} dark={dark||amoled} emptyMsg={T("empty_no_fav")} lang={lang}
            playlists={playlists} setPlaylists={setPlaylists} queue={queue} setQueue={setQueue} setSongs={setSongs}
            selectionMode={selMode} setSelectionMode={setSelMode}
            selected={selected} setSelected={setSelected}
            showSheet={showSheet} setShowSheet={setShowSheet}
            sortBy={sortBy} sortOrder={sortOrder} setBlacklist={setBlacklist}
            scrollKey="favorites" scrollPositions={scrollPositions}
            headerSlot={
              <div style={{display:"flex",gap:10,marginBottom:16}}>
                {[
                  { id:"recently",   icon:"clock", label:T("header_baru_diputar"),  count: playHistory.length },
                  { id:"mostplayed", icon:"chart", label:T("header_paling_sering"), count: Object.values(playCounts).filter(c=>c>=2).length },
                ].map(item => (
                  <button key={item.id} onClick={()=>setPage(item.id)} style={{
                    flex:1, display:"flex", alignItems:"center", gap:10,
                    padding:"11px 14px", borderRadius:16,
                    background: dark||amoled ? `${dc}18` : dl,
                    border:`1.5px solid ${dc}33`,
                    fontFamily:"inherit", cursor:"pointer",
                    transition:"all 0.2s",
                  }}>
                    <div style={{
                      width:36, height:36, borderRadius:10, flexShrink:0,
                      background:`linear-gradient(135deg,${dc},${dd})`,
                      display:"flex", alignItems:"center", justifyContent:"center",
                    }}>
                      <Ic n={item.icon} size={18} col="white"/>
                    </div>
                    <div style={{textAlign:"left", minWidth:0}}>
                      <div style={{fontSize:12, fontWeight:800, color: dark||amoled ? "#eee" : "#1a1a1a",
                        whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>
                        {item.label}
                      </div>
                      <div style={{fontSize:11, color: dc, fontWeight:700}}>
                        {item.count} {T("songs_count")}
                      </div>
                    </div>
                  </button>
                ))}
              </div>
            }/>
        )}
        {page==="albums"    && !subPage && <AlbumsPage albums={albums} songs={visibleSongs} onPlay={(s,list)=>playSongInContext(s,list||visibleSongs)} currentSong={curSong} isPlaying={playing} onFav={toggleFav} dc={dc} dl={dl} dark={dark||amoled} initialOpen={navTarget?.page==="albums"?navTarget.target:null} onMounted={()=>setNavTarget(null)} sortBy={sortBy} sortOrder={sortOrder} scrollKey="albums" scrollPositions={scrollPositions} lang={lang}/>}
        {page==="artists"   && !subPage && <ArtistsPage songs={visibleSongs} currentSong={curSong} isPlaying={playing} onPlay={(s,list)=>playSongInContext(s,list||visibleSongs)} onFav={toggleFav} dc={dc} dd={dd} dl={dl} dark={dark||amoled} initialOpen={navTarget?.page==="artists"?navTarget.target:null} onMounted={()=>setNavTarget(null)} sortBy={sortBy} sortOrder={sortOrder} scrollKey="artists" scrollPositions={scrollPositions} lang={lang}/>}
        {page==="playlist"  && !subPage && <PlaylistsPage playlists={playlists} setPlaylists={setPlaylists} songs={visibleSongs} currentSong={curSong} isPlaying={playing} onPlay={(s,list)=>playSongInContext(s,list||visibleSongs)} onFav={toggleFav} dc={dc} dd={dd} dl={dl} dark={dark||amoled} sortBy={sortBy} sortOrder={sortOrder} scrollKey="playlist" scrollPositions={scrollPositions} lang={lang}/>}
        {page==="recently"  && !subPage && <RecentlyPlayedPage playHistory={playHistory} songs={visibleSongs} currentSong={curSong} isPlaying={playing} onPlay={(s,list)=>playSongInContext(s,list||visibleSongs)} onFav={toggleFav} onClearHistory={()=>setPlayHistory([])} dc={dc} dd={dd} dl={dl} dark={dark||amoled} lang={lang} scrollKey="recently" scrollPositions={scrollPositions}/>}
        {page==="mostplayed" && !subPage && <MostPlayedPage playCounts={playCounts} songs={visibleSongs} currentSong={curSong} isPlaying={playing} onPlay={(s,list)=>playSongInContext(s,list||visibleSongs)} onFav={toggleFav} dc={dc} dd={dd} dl={dl} dark={dark||amoled} lang={lang} scrollKey="mostplayed" scrollPositions={scrollPositions}/>}
        {page==="years"     && !subPage && <YearsPage songs={visibleSongs} currentSong={curSong} isPlaying={playing} onPlay={(s,list)=>playSongInContext(s,list||visibleSongs)} onFav={toggleFav} dc={dc} dl={dl} dark={dark||amoled} scrollKey="years" scrollPositions={scrollPositions} lang={lang}/>}
        {page==="genres"    && !subPage && <GenresPage songs={visibleSongs} currentSong={curSong} isPlaying={playing} onPlay={(s,list)=>playSongInContext(s,list||visibleSongs)} onFav={toggleFav} dc={dc} dl={dl} dark={dark||amoled} scrollKey="genres" scrollPositions={scrollPositions} lang={lang}/>}
        {page==="folders"   && !subPage && <FoldersPage folders={folders} dc={dc} dl={dl} dark={dark||amoled} initialOpen={navTarget?.page==="folders"?navTarget.target:null} onMounted={()=>setNavTarget(null)} sortBy={sortBy} sortOrder={sortOrder} onOpenFolder={f => goToSubPage("folder:"+f.name)} scrollKey="folders" scrollPositions={scrollPositions} lang={lang}/>}
        {page==="folders"   && subPage?.startsWith("folder:") && (() => {
          const folderName = subPage.slice(7);
          const folderSongs = visibleSongs.filter(s => s.folder === folderName);
          return (
            <LibraryPage
              songs={folderSongs} currentSong={curSong} isPlaying={playing}
              onPlay={(s,list)=>playSongInContext(s,list||folderSongs)} onFav={toggleFav}
              dc={dc} dd={dd} dl={dl} dark={dark||amoled} onShowToast={showToast} lang={lang}
              playlists={playlists} setPlaylists={setPlaylists}
              queue={queue} setQueue={setQueue} setSongs={setSongs}
              selectionMode={selMode} setSelectionMode={setSelMode}
              selected={selected} setSelected={setSelected}
              showSheet={showSheet} setShowSheet={setShowSheet}
              sortBy={sortBy} sortOrder={sortOrder}
              emptyMsg={T("empty_folder")}
              setBlacklist={setBlacklist}
              scrollKey={`folder:${folderName}`} scrollPositions={scrollPositions}
            />
          );
        })()}
        {page==="settings"  && !subPage && <SettingsPage onSub={goToSubPage} dc={dc} dl={dl} dd={dd} dark={dark||amoled} lang={lang}/>}
        {subPage==="gesture" && <GesturePage dc={dc} dd={dd} dl={dl} dark={dark} amoled={amoled} swipeLeftEnabled={swipeLeftEnabled} onSwipeLeftEnabled={setSwipeLeftEnabled} swipeLeftAction={swipeLeftAction} onSwipeLeftAction={setSwipeLeftAction} lang={lang}/>}
        {subPage==="tema"   && <TemaPage  dark={dark} onToggle={setDark} amoled={amoled} onAmoled={setAmoled} amoledShadows={amoledShadows} onAmoledShadows={setAmoledShadows} autoTheme={autoTheme} onAutoTheme={setAutoTheme} autoThemeMode={autoThemeMode} onAutoThemeMode={setAutoThemeMode} coverRadius={coverRadius} onCoverRadius={setCoverRadius} customCoverRadius={customCoverRadius} onCustomCoverRadius={setCustomCoverRadius} coverRadiusAll={coverRadiusAll} onCoverRadiusAll={setCoverRadiusAll} animSpeed={animSpeed} onAnimSpeed={setAnimSpeed} searchOnTop={searchOnTop} onSearchOnTop={setSearchOnTop} plainLyricsSize={plainLyricsSize} onPlainLyricsSize={setPlainLyricsSize} keepScreenOn={keepScreenOn} onKeepScreenOn={setKeepScreenOn} dc={dc} dd={dd} lang={lang}/>}
        {subPage==="navbar" && <NavbarPage active={activeNav} onToggle={toggleNav} dc={dc} dd={dd} dl={dl} dark={dark||amoled} lang={lang}/>}
        {subPage==="audio"  && <AudioPage  dc={dc} dd={dd} dl={dl} dark={dark||amoled} onImport={openFileImport} onImportFolder={openFolderImport} onRescan={rescanFolders} onOutputChange={async(id)=>{ try{ await audioRef.current.setSinkId(id); try{ await crossfadeAudioRef.current.setSinkId(id); }catch(e){} }catch(e){ console.warn("setSinkId failed",e); } }} crossfadeDuration={crossfadeDuration} setCrossfadeDuration={setCrossfadeDuration} playbackSpeed={playbackSpeed} setPlaybackSpeed={setPlaybackSpeed} songs={songs} blacklist={blacklist} setBlacklist={setBlacklist} currentSong={curSong} lang={lang}/>}
        {subPage==="about"  && <AboutPage  dc={dc} dd={dd} dl={dl} dark={dark||amoled} amoled={amoled} amoledShadows={amoledShadows} lang={lang} onLang={setLang}/>}
        {(page==="nowplaying" || npClosing) && (
          <NowPlayingPage
            song={curSong} isPlaying={playing} progress={progress} onSeek={seekTo}
            onPlay={toggle} onNext={next} onPrev={prev}
            onClose={closeNP} onFav={toggleFav} onSettings={onSettingsBtn}
            onNavigate={(page, target) => {
              closeNP();
              setTimeout(() => {
                goTo(page);
                if (target) setNavTarget({page, target});
              }, 140);
            }}
            dc={dc} dd={dd} dl={dl}
            lyrics={lyrics}
            onSetLyricsOverride={(songId, parsed) => setLyricsOverride(o => ({...o, [songId]: parsed}))}
            getAudioTime={getAudioTime}
            closing={npClosing} dark={dark||amoled}
            onSwipeClose={closeNPInstant}
            boltKey={boltKey}
            queue={queue} setQueue={setQueue} songs={songs}
            onPlayFromQueue={playSong} lang={lang}
            shuffle={shuffle} setShuffle={setShuffle}
            repeat={repeat} setRepeat={setRepeat}
            playlists={playlists} setPlaylists={setPlaylists}
            sleepTimer={sleepTimer}
            onSetSleepTimer={startSleepTimer}
            onCancelSleepTimer={cancelSleepTimer}
            coverRadius={customCoverRadius ? coverRadius : 28}
            playbackSpeed={playbackSpeed} setPlaybackSpeed={setPlaybackSpeed}
            amoled={amoled} amoledShadows={amoledShadows} plainLyricsSize={plainLyricsSize} keepScreenOn={keepScreenOn}/>
        )}
      </div>

      {/* Bottom zone */}
      <div style={{
        position:"absolute",bottom:0,left:0,right:0,zIndex:20,
        padding:"0 22px 20px",
        background: amoled
          ? "linear-gradient(to bottom,transparent,rgba(0,0,0,0.85) 28%,rgba(0,0,0,0.98))"
          : dark
            ? "linear-gradient(to bottom,transparent,rgba(17,17,17,0.8) 28%,rgba(17,17,17,0.96))"
            : "linear-gradient(to bottom,transparent,rgba(255,253,249,0.8) 28%,rgba(255,253,249,0.96))",
        pointerEvents:"none",
      }}>
        {/* Hidden file input */}
        <input ref={fileInputRef} type="file" accept="audio/*" multiple
          style={{display:"none"}} onChange={handleFileImport}/>

        {/* Minibar */}
        {(miniVisible || miniClosing) && page!=="nowplaying" && !npClosing && (
          <div
            ref={miniRef}
            className={`${miniFlyToBubble ? "mini-to-bubble" : miniClosing ? "mini-slide-down" : (miniVisible ? "mini-slide-up" : "")}`}
            onClick={()=>!miniClosing && !miniFlyToBubble && goTo("nowplaying")}
            onTouchStart={handleMiniPointerDown}
            onTouchMove={handleMiniPointerMove}
            onTouchEnd={handleMiniPointerUp}
            onPointerDown={handleMiniPointerDown}
            onPointerMove={handleMiniPointerMove}
            onPointerUp={handleMiniPointerUp}
            style={{
              pointerEvents:"auto", position:"relative",
              display:"flex", alignItems:"center", gap:12,
              padding:"10px 14px", borderRadius:22, marginBottom:12,
              background: dark
                ? `linear-gradient(135deg, rgba(40,40,40,0.95), rgba(28,28,28,0.98))`
                : `linear-gradient(135deg, rgba(255,255,255,0.97), rgba(250,248,244,0.99))`,
              boxShadow:(amoled && !amoledShadows)
                ? `0 1px 6px rgba(0,0,0,0.25)`
                : `0 1px 6px rgba(0,0,0,0.12), 0 0 16px ${dc}33`,
              cursor:"pointer", border:`1.5px solid ${dc}55`,
              touchAction:"pan-x", overflow:"hidden",
              willChange:"transform", transform:"translateZ(0)",
            }}>

            <div style={{animation:playing?"spinCover 8s linear infinite":"none",transformOrigin:"center",flexShrink:0,overflow:"hidden",borderRadius:14,boxShadow:(amoled&&!amoledShadows)?"none":`0 4px 12px ${dc}44`,marginLeft:6}}>
              <CoverArt song={curSong} size={44}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              {(()=>{
                const t = curSong?.title || "";
                const isLong = t.length > 18;
                return isLong ? (
                  <div className="marquee-wrap" style={{fontSize:14,fontWeight:800,color:miniTitleColor}}>
                    <span className={playing?"marquee-track running":"marquee-track"}
                      style={{"--marquee-dist":`-${Math.min(t.length*7,180)}px`}}>
                      <span>{t}</span><span aria-hidden="true">{t}</span>
                    </span>
                  </div>
                ) : (
                  <div style={{fontSize:14,fontWeight:800,color:miniTitleColor,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t}</div>
                );
              })()}
              <div style={{fontSize:12,color:miniArtistColor,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",fontWeight:700}}>{curSong?.artist}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <button onClick={e=>{e.stopPropagation();prev();}} style={mBtn(miniBtnColor)}><Ic n="prev" size={22} col={miniBtnColor}/></button>
              <button onClick={e=>{e.stopPropagation();toggle();}} style={{...mBtn(miniBtnColor),background:dc,borderRadius:"50%",width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:(amoled&&!amoledShadows)?"none":`0 4px 12px ${dc}66`}}><Ic n={playing?"pause":"play"} size={18} col="white"/></button>
              <button onClick={e=>{e.stopPropagation();next();}} style={mBtn(miniBtnColor)}><Ic n="next" size={22} col={miniBtnColor}/></button>
            </div>
            <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,borderRadius:"0 0 22px 22px",background:dark?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.06)"}}>
              <div ref={miniProgressBarRef} style={{height:"100%",width:`${curSong?.duration?(progress/curSong.duration)*100:0}%`,borderRadius:"0 0 22px 22px",background:`linear-gradient(90deg,${dd},${dc})`,transition:"width 0.5s linear"}}/>
            </div>
          </div>
        )}
        {/* Sleep timer badge — absolute di atas minibar */}
        {sleepTimer !== null && (miniVisible || miniClosing) && page!=="nowplaying" && !npClosing && (
          <div
            className={`${miniFlyToBubble ? "mini-to-bubble" : miniClosing ? "mini-slide-down" : (miniVisible ? "mini-slide-up" : "")}`}
            style={{position:"absolute",bottom:miniBarHeight+91,right:22,pointerEvents:"none",zIndex:25}}>
            <div onClick={e=>{e.stopPropagation();openNP();}}
              style={{
                display:"inline-flex",alignItems:"center",gap:3,
                background:dc,borderRadius:20,padding:"2px 9px",
                fontSize:10,fontWeight:800,color:"white",letterSpacing:0.3,
                "--sg":dc,
                animation:sleepTimer<60
                  ?"timerBadgeIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both, sleepGlow 0.9s 0.38s ease-in-out infinite"
                  :"timerBadgeIn 0.38s cubic-bezier(0.34,1.56,0.64,1) both",
                boxShadow:`0 2px 8px ${dc}66`,
                pointerEvents:"auto",
              }}>
              ⏲ {(()=>{const m=Math.floor(sleepTimer/60),s=sleepTimer%60;return m>0?`${m}m${s>0?" "+s+"s":""}`:s+"s";})()}
            </div>
          </div>
        )}

        {/* Bottom row: navbar pill centered, bubbles absolutely positioned */}
        {page !== "nowplaying" && !npClosing && (
          <div style={{position:"relative",display:"flex",justifyContent:"center",alignItems:"center",pointerEvents:"none"}}
            ref={navbarRef}
            onTouchStart={handleNavbarPointerDown}
            onTouchEnd={handleNavbarPointerUp}
            onPointerDown={handleNavbarPointerDown}
            onPointerUp={handleNavbarPointerUp}
          >
            {/* Navbar pill — centered, tidak terpengaruh bubble */}
            <div style={{
              background:dark?"rgba(37,37,37,1)":"rgba(255,255,255,1)",
              borderRadius:100,padding:"6px 10px",overflow:"hidden",
              willChange:"transform",transform:"translateZ(0)",
              boxShadow:`0 4px 16px ${dark?"rgba(0,0,0,0.35)":"rgba(0,0,0,0.12)"}, 0 0 8px 0 ${dark?"rgba(0,0,0,0.25)":"rgba(0,0,0,0.08)"}, 0 0 18px 2px ${dc}44`,
              outline:`6px solid ${dark?"rgba(37,37,37,1)":"rgba(255,255,255,1)"}`,
              outlineOffset:"-6px",border:`2px solid ${dc}55`,display:"inline-flex",
              pointerEvents:"auto",
            }}>
              <div ref={navScrollRef} className="nav-scroll" style={{maxWidth:210,padding:"0 21px"}}>
                {visibleNav.map(item=>{
                  const active=page===item.id&&!["tema","navbar","audio","about"].includes(subPage);
                  return(
                    <button key={item.id} data-navid={item.id} onClick={()=>goTo(item.id)} style={{
                      background:active?(dark?dc+"28":dl):"transparent",
                      border:"none",borderRadius:40,padding:"0 16px",height:40,cursor:"pointer",
                      color:active?(dark?dc:dd):(dark?"#777":"#aaa"),
                      transition:"all 0.22s ease",display:"flex",alignItems:"center",gap:6,
                    }}>
                      <Ic n={item.icon} size={20} col={active?(dark?dc:dd):(dark?"#777":"#aaa")}/>
                      {active&&<span style={{fontSize:12,fontWeight:800,whiteSpace:"nowrap"}}>{T("n_"+item.id)}</span>}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Kiri: search bubble / settings — absolute, sejajar vertikal dengan navbar */}
            <div style={{position:"absolute",left:-4,top:"50%",transform:"translateY(-50%)",pointerEvents:"auto"}}>
              {searchOnTop ? (
                <button onClick={onSettingsBtn} style={{
                  background: isOnSettings ? dc : (dark?"#252525":"#ffffff"),
                  border:"none", borderRadius:"50%",
                  width:50, height:50,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  boxShadow: isOnSettings
                    ? `0 0 10px 2px ${dc}88`
                    : (dark||amoled)
                      ? `0 4px 16px rgba(255,255,255,0.12),0 1px 4px rgba(255,255,255,0.08)`
                      : `0 4px 16px rgba(0,0,0,0.22),0 1px 4px rgba(0,0,0,0.14)`,
                  transition:"background 0.2s, box-shadow 0.2s",
                  cursor:"pointer",
                }}>
                  <span key={boltKey} className={boltKey>0?"bolt-spin":""}
                    style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <Ic n="settings" size={22} col={isOnSettings?"white":(dark||amoled)?"#aaa":"#666"}/>
                  </span>
                </button>
              ) : (
                !["tema","navbar","audio","about"].includes(subPage) && (
                  <div
                    key={searchBubbleKey}
                    ref={searchBubbleRef}
                    className="bubble-in"
                    style={{
                      width:50,height:50,borderRadius:"50%",
                      boxShadow:(dark||amoled)?`0 4px 16px rgba(255,255,255,0.12),0 1px 4px rgba(255,255,255,0.08)`:`0 4px 16px rgba(0,0,0,0.22),0 1px 4px rgba(0,0,0,0.14)`,
                      cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                      background:showSearch?dc:(dark?"#252525":"#ffffff"),
                      backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",
                      transition:"background 0.22s, transform 0.1s",
                      touchAction:"none",userSelect:"none",
                    }}
                    onPointerDown={e=>{searchBubbleRef.current.setPointerCapture(e.pointerId);searchDragY.current=e.clientY;searchDragDelta.current=0;}}
                    onPointerMove={e=>{
                      if(searchDragY.current===null)return;
                      const dy=searchDragY.current-e.clientY;searchDragDelta.current=dy;
                      const cl=Math.max(-10,Math.min(dy,60));
                      if(searchBubbleRef.current){
                        searchBubbleRef.current.style.transform=`translateY(${-Math.max(0,cl)}px) scale(${1+Math.max(0,cl/60)*0.12})`;
                        if(cl>24)searchBubbleRef.current.style.background=dc;
                        else searchBubbleRef.current.style.background="";
                      }
                    }}
                    onPointerUp={e=>{
                      const dy=searchDragDelta.current;
                      if(searchBubbleRef.current){searchBubbleRef.current.style.transform="";searchBubbleRef.current.style.background="";}
                      searchDragY.current=null;searchDragDelta.current=0;
                      if(dy>30){setShowSearch(true);setSearchQuery("");}
                      else if(dy>-10&&dy<10){if(showSearch)closeSearch();else{setShowSearch(true);setSearchQuery("");}}
                    }}
                  >
                    <Ic n={showSearch?"close":"search"} size={21} col={showSearch?"white":dc}/>
                  </div>
                )
              )}
            </div>

            {/* Kanan: NP bubble — absolute, sejajar vertikal dengan navbar */}
            <div style={{position:"absolute",right:-8,top:"50%",transform:"translateY(-50%)",pointerEvents:"auto"}}>

              {bubbleVisible && (
                <div
                  key={`np-${bubbleKey}`}
                  ref={npBubbleRef}
                  className="bubble-in"
                  style={{width:56,height:56,cursor:"pointer",touchAction:"none",userSelect:"none",position:"relative"}}
                  onPointerDown={e=>{npBubbleRef.current.setPointerCapture(e.pointerId);npBubbleDragY.current=e.clientY;npBubbleDelta.current=0;}}
                  onPointerMove={e=>{
                    if(npBubbleDragY.current===null)return;
                    const dy=npBubbleDragY.current-e.clientY;npBubbleDelta.current=dy;
                    const cl=Math.max(-8,Math.min(dy,60));
                    if(npBubbleRef.current)npBubbleRef.current.style.transform=`translateY(${-Math.max(0,cl)}px) scale(${1+Math.max(0,cl/60)*0.12})`;
                  }}
                  onPointerUp={e=>{
                    const dy=npBubbleDelta.current;
                    if(npBubbleRef.current)npBubbleRef.current.style.transform="";
                    npBubbleDragY.current=null;npBubbleDelta.current=0;
                    if(dy>30){setBubbleVisible(false);setMiniVisible(true);}
                    else if(dy>-10&&dy<10){goTo("nowplaying");}
                  }}
                >
                  <svg width={56} height={56} style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
                    <circle cx={28} cy={28} r={25} fill="none" stroke={dc+"33"} strokeWidth={3}/>
                    <circle cx={28} cy={28} r={25} fill="none" stroke={dc} strokeWidth={3}
                      ref={bubbleRingRef} strokeLinecap="round"
                      strokeDasharray={`${2*Math.PI*25}`}
                      strokeDashoffset={`${2*Math.PI*25*(1-(curSong?.duration?progress/curSong.duration:0))}`}
                      style={{transition:"stroke-dashoffset 0.4s linear"}}/>
                  </svg>
                  <div style={{position:"absolute",inset:3,borderRadius:"50%",overflow:"hidden",border:`1.5px solid ${dc}55`,display:"flex",alignItems:"center",justifyContent:"center",background:miniBg}}>
                    <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",animation:playing?"spinCover 8s linear infinite":"none",transformOrigin:"center"}}>
                      <CoverArt song={curSong} size={50}/>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      {/* Search Overlay */}
      {(showSearch || searchClosing) && page !== "nowplaying" && (
        <div style={{
          position:"absolute", inset:0, zIndex:19,
          background: dark ? "rgba(0,0,0,0.55)" : "rgba(0,0,0,0.25)",
          backdropFilter:"blur(4px)", WebkitBackdropFilter:"blur(4px)",
          pointerEvents:"auto",
          opacity: searchClosing ? 0 : 1,
          transition:"opacity 0.28s ease",
        }} onClick={closeSearch}>
          <div onClick={e=>e.stopPropagation()} className={searchClosing ? "sheet-down" : "sheet-up"} style={{
            position:"absolute", bottom:0, left:0, right:0,
            background: dark ? "#1a1a1a" : "#fffdf9",
            borderRadius:"24px 24px 0 0",
            boxShadow:"0 -8px 40px rgba(0,0,0,0.18)",
            padding:"14px 18px 230px",
            maxHeight:"78vh", display:"flex", flexDirection:"column",
          }}>
            {/* Handle */}
            <div style={{width:36,height:4,borderRadius:2,background:"#ddd",margin:"0 auto 14px",flexShrink:0}}/>
            {/* Search input */}
            <div style={{
              display:"flex", alignItems:"center", gap:10,
              background: dark ? "#2a2a2a" : "white",
              borderRadius:16, padding:"10px 14px",
              border:`1.5px solid ${dc}44`,
              boxShadow:`0 2px 12px ${dc}22`,
              flexShrink:0, marginBottom:14,
            }}>
              <Ic n="search" size={20} col={dc}/>
              <input
                autoFocus
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && searchQuery.trim()) addRecentSearch(searchQuery); }}
                placeholder={T("srch_placeholder")}
                style={{
                  flex:1, border:"none", outline:"none", background:"transparent",
                  fontSize:15, fontWeight:700, fontFamily:"inherit",
                  color: dark ? "#eee" : "#1a1a1a",
                }}
              />
              {searchQuery && (
                <button onClick={()=>setSearchQuery("")} style={{background:"none",border:"none",padding:0,cursor:"pointer",display:"flex"}}>
                  <Ic n="close" size={18} col="#aaa"/>
                </button>
              )}
            </div>
            {/* Results */}
            <div style={{overflowY:"auto", flex:1}}>
              {(()=>{
                const q = searchQuery.trim().toLowerCase();
                if (!q) return (
                  <div>
                    {recentSearches.length > 0 ? (
                      <div>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                          <div style={{fontSize:11,fontWeight:800,color:"#aaa",letterSpacing:0.5,textTransform:"uppercase",paddingLeft:2}}>
                            {T("srch_recent")}
                          </div>
                          <button onClick={clearRecentSearches}
                            style={{background:"none",border:"none",cursor:"pointer",
                              fontSize:11,fontWeight:800,color:dc,padding:"2px 4px"}}>
                            {T("srch_clear_all")}
                          </button>
                        </div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                          {recentSearches.map(q => (
                            <div key={q} style={{display:"inline-flex",alignItems:"center",gap:6,
                              background:dark?"#2a2a2a":"#f0ede8",borderRadius:20,
                              padding:"6px 12px",cursor:"pointer"}}
                              onClick={()=>setSearchQuery(q)}>
                              <Ic n="history" size={14} col={dc}/>
                              <span style={{fontSize:13,fontWeight:700,color:dark?"#eee":"#1a1a1a"}}>{q}</span>
                              <button onClick={e=>{e.stopPropagation();removeRecentSearch(q);}}
                                style={{background:"none",border:"none",padding:0,cursor:"pointer",display:"flex",marginLeft:2}}>
                                <Ic n="close" size={12} col="#aaa"/>
                              </button>
                            </div>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <div style={{textAlign:"center",marginTop:32,color:"#bbb",fontSize:14,fontWeight:700}}>
                        {T("srch_hint")}
                      </div>
                    )}
                  </div>
                );
                const results = songs.filter(s =>
                  s.title.toLowerCase().includes(q) ||
                  s.artist.toLowerCase().includes(q) ||
                  s.album.toLowerCase().includes(q)
                );
                if (!results.length) return (
                  <div style={{textAlign:"center",marginTop:32,color:"#bbb",fontSize:14,fontWeight:700}}>
                    {T("srch_no_results")} "{searchQuery}"
                  </div>
                );

                const byTitle  = results.filter(s => s.title.toLowerCase().includes(q));
                const byArtist = results.filter(s => !s.title.toLowerCase().includes(q) && s.artist.toLowerCase().includes(q));
                const byAlbum  = results.filter(s => !s.title.toLowerCase().includes(q) && !s.artist.toLowerCase().includes(q) && s.album.toLowerCase().includes(q));

                const Highlight = ({text}) => {
                  const idx = text.toLowerCase().indexOf(q);
                  if (idx < 0) return <span>{text}</span>;
                  return <span>{text.slice(0,idx)}<span style={{color:dc,fontWeight:900}}>{text.slice(idx,idx+q.length)}</span>{text.slice(idx+q.length)}</span>;
                };

                const Row = ({s, badge}) => (
                  <div onClick={()=>{ addRecentSearch(searchQuery); playSong(s); closeSearch(); }} style={{
                    display:"flex", alignItems:"center", gap:12, padding:"9px 4px",
                    borderRadius:14, cursor:"pointer", marginBottom:2,
                    transition:"background 0.15s",
                  }}
                    onMouseEnter={e=>e.currentTarget.style.background=dark?dc+"20":dl}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <CoverArt song={s} size={44} />
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:800,color:dark?"#eee":"#1a1a1a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                        <Highlight text={s.title}/>
                      </div>
                      <div style={{fontSize:12,color:"#aaa",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                        <Highlight text={s.artist}/> · <Highlight text={s.album}/>
                      </div>
                    </div>
                    {badge && <span style={{fontSize:10,fontWeight:800,color:dc,background:dc+"18",padding:"2px 8px",borderRadius:20,flexShrink:0}}>{badge}</span>}
                    {curSong?.id===s.id && <div style={{width:6,height:6,borderRadius:"50%",background:dc,flexShrink:0}}/>}
                  </div>
                );

                return (
                  <>
                    {byTitle.length>0  && <><div style={{fontSize:11,fontWeight:800,color:"#bbb",marginBottom:6,marginTop:4,letterSpacing:0.5}}>{T("srch_sec_title")}</div>{byTitle.map(s=><Row key={s.id} s={s} badge={T("srch_badge_title")}/>)}</>}
                    {byArtist.length>0 && <><div style={{fontSize:11,fontWeight:800,color:"#bbb",marginBottom:6,marginTop:10,letterSpacing:0.5}}>{T("srch_sec_artist")}</div>{byArtist.map(s=><Row key={s.id} s={s} badge={T("srch_badge_artist")}/>)}</>}
                    {byAlbum.length>0  && <><div style={{fontSize:11,fontWeight:800,color:"#bbb",marginBottom:6,marginTop:10,letterSpacing:0.5}}>{T("srch_sec_album")}</div>{byAlbum.map(s=><Row key={s.id} s={s} badge={T("srch_badge_album")}/>)}</>}
                    <div style={{textAlign:"center",marginTop:12,fontSize:12,color:"#ccc"}}>{results.length} {T("srch_results_count")}</div>
                  </>
                );
              })()}
            </div>
          </div>
        </div>
      )}
      {scanState && (
        <ScanProgressModal
          state={scanState} dc={dc} dd={dd} dark={dark||amoled} lang={lang}
          onCancel={() => { cancelScanRef.current = true; setScanState(null); }}
        />
      )}
      {toastMsg && (
        <SuccessOverlay key={toastKey} msg={toastMsg.msg} variant={toastMsg.variant} dc={dc} dd={dd} dark={dark} onDone={()=>setToastMsg(null)}
          bottomOffset={page==="nowplaying" ? 40 : bubbleVisible ? 96 : 170}/>
      )}
      {showSortSheet && (
        <SortSheet
          onClose={() => setShowSortSheet(false)}
          currentSortBy={sortBy}
          currentSortOrder={sortOrder}
          onSortChange={(newBy, newOrder) => {
            setSortBy(newBy);
            setSortOrder(newOrder);
          }}
          dc={dc} dd={dd} dl={dl} dark={dark} page={page} lang={lang}
        />
      )}
    </div>
  );
}

const cBtn = (bg, col, size) => ({
  background:bg, border:"none", borderRadius:size/2,
  width:size, height:size, cursor:"pointer", color:col,
  display:"flex", alignItems:"center", justifyContent:"center",
  transition:"all 0.18s ease", flexShrink:0,
});
const mBtn = col => ({
  background:"none", border:"none", cursor:"pointer", color:col||"#777",
  padding:4, display:"flex", alignItems:"center", justifyContent:"center", borderRadius:8,
});

ReactDOM.createRoot(document.getElementById('root')).render(<MusicPlayer/>);
</script>


</body>
</html>
